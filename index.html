<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Lingua">
<title>Lingua</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--g:#4CAF50;--gd:#388E3C;--gl:#E8F5E9;--n:#1a1f3c;--bg:#fff;--bg2:#f7f7f5;--bg3:#efefed;--tx:#111;--tx2:#555;--tx3:#999;--bd:rgba(0,0,0,0.1);--bd2:rgba(0,0,0,0.2);}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;--tx:#f2f2f7;--tx2:#aeaeb2;--tx3:#636366;--bd:rgba(255,255,255,0.1);--bd2:rgba(255,255,255,0.2);}}
body{background:var(--bg2);font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;min-height:100vh;display:flex;justify-content:center;}
.app{width:100%;max-width:430px;min-height:100vh;background:var(--bg);display:flex;flex-direction:column;}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:0.5px solid var(--bd);background:var(--bg);flex-shrink:0;position:sticky;top:0;z-index:20;gap:8px;}
.lang-toggle{display:flex;background:var(--bg2);border-radius:10px;padding:3px;gap:3px;overflow-x:auto;}
.lang-toggle::-webkit-scrollbar{display:none;}
.lang-btn{padding:5px 11px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:transparent;font-family:inherit;color:var(--tx2);border-radius:7px;white-space:nowrap;flex-shrink:0;}
.lang-btn.active{background:var(--g);color:#fff;}
.user-pill{display:flex;align-items:center;gap:5px;background:var(--bg2);border-radius:20px;padding:4px 8px 4px 5px;min-width:0;flex:1;}
.user-av{width:20px;height:20px;border-radius:50%;background:var(--n);display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:700;flex-shrink:0;}
.user-em{font-size:11px;color:var(--tx2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.logout-x{font-size:15px;color:var(--tx3);cursor:pointer;background:none;border:none;padding:2px;}
.screen{flex:1;overflow-y:auto;padding:20px 16px 90px;-webkit-overflow-scrolling:touch;}
.navbar{display:flex;border-top:0.5px solid var(--bd);background:var(--bg);position:sticky;bottom:0;z-index:20;padding-bottom:env(safe-area-inset-bottom);}
.nav-item{flex:1;text-align:center;padding:10px 0 12px;cursor:pointer;font-size:10px;color:var(--tx3);-webkit-tap-highlight-color:transparent;}
.nav-item.active{color:var(--g);}
.nav-icon{font-size:18px;display:block;margin-bottom:2px;}
.word-card{background:var(--bg);border:0.5px solid var(--bd);border-radius:12px;padding:14px 16px;margin-bottom:8px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.word-card:active{border-color:var(--g);}
.tag{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:600;}
.tag-ja{background:#E3F2FD;color:#1565C0;}
.tag-fr{background:#E8F5E9;color:#2E7D32;}
.tag-en{background:#F3E5F5;color:#6A1B9A;}
.lv-badge{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:600;}
.mastered-badge{font-size:11px;padding:2px 9px;border-radius:20px;background:#E8F5E9;color:#2E7D32;font-weight:600;}
.sort-bar{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;}
.sort-bar::-webkit-scrollbar{display:none;}
.sort-btn{padding:5px 13px;font-size:12px;border:0.5px solid var(--bd);border-radius:20px;background:transparent;cursor:pointer;font-family:inherit;color:var(--tx2);white-space:nowrap;flex-shrink:0;}
.sort-btn.active{background:var(--g);color:#fff;border-color:var(--g);}
.btn{width:100%;padding:14px;background:var(--g);color:#fff;border:none;border-radius:12px;font-size:15px;cursor:pointer;font-weight:700;font-family:inherit;}
.btn:active{background:var(--gd);}
.btn:disabled{opacity:.45;cursor:default;}
.btn-ghost{width:100%;padding:13px;background:transparent;color:var(--g);border:2px solid var(--g);border-radius:12px;font-size:14px;cursor:pointer;font-weight:600;font-family:inherit;}
.btn-back{background:none;border:0.5px solid var(--bd);border-radius:10px;font-size:14px;color:var(--tx);cursor:pointer;padding:8px 14px;margin-bottom:18px;font-family:inherit;}
.add-btn{width:100%;padding:14px;border:1.5px dashed var(--bd2);border-radius:12px;background:transparent;font-size:14px;color:var(--tx3);cursor:pointer;margin-bottom:12px;font-family:inherit;}
.inp{width:100%;padding:12px 14px;border:1px solid var(--bd);border-radius:12px;font-size:16px;outline:none;font-family:inherit;background:var(--bg);color:var(--tx);}
.inp:focus{border-color:var(--g);}
.spk-btn{background:none;border:1px solid var(--bd);border-radius:20px;padding:6px 12px;font-size:13px;cursor:pointer;color:var(--g);font-family:inherit;display:inline-flex;align-items:center;gap:5px;}
.sec-lbl{font-size:11px;font-weight:700;letter-spacing:.07em;color:var(--tx3);margin:20px 0 10px;text-transform:uppercase;}
.info-blk{background:var(--bg2);border-radius:10px;padding:12px 14px;font-size:14px;color:var(--tx2);margin-bottom:8px;line-height:1.6;}
.ex-blk{background:var(--bg2);border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.conj-sec{background:var(--bg2);border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.tense-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;}
.tense-tab{padding:5px 12px;font-size:12px;border:1px solid var(--bd);border-radius:20px;cursor:pointer;background:transparent;font-family:inherit;color:var(--tx2);font-weight:500;}
.tense-tab.active{background:var(--n);color:#fff;border-color:var(--n);}
.conj-table{width:100%;border-collapse:collapse;font-size:13px;}
.conj-table th{text-align:left;color:var(--tx3);font-weight:400;padding:6px 8px 6px 0;font-size:12px;width:38%;}
.conj-table td{color:var(--tx);padding:6px 0;border-bottom:0.5px solid var(--bd);}
.conj-table tr:last-child td{border-bottom:none;}
.ipa{font-size:11px;color:var(--tx3);margin-left:5px;}
.flash-card{border:1px solid var(--bd);border-radius:16px;padding:36px 24px;text-align:center;cursor:pointer;min-height:220px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:16px;}
.flash-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn-wrong{padding:14px;background:#FFEBEE;color:#B71C1C;border:none;border-radius:12px;font-size:14px;cursor:pointer;font-weight:700;font-family:inherit;}
.btn-correct{padding:14px;background:#E8F5E9;color:#2E7D32;border:none;border-radius:12px;font-size:14px;cursor:pointer;font-weight:700;font-family:inherit;}
.prog-bar{height:3px;background:var(--bg3);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.prog-fill{height:100%;background:var(--g);border-radius:2px;transition:width .4s;}
.quiz-opt{width:100%;padding:13px 14px;border:1px solid var(--bd);border-radius:12px;font-size:14px;cursor:pointer;background:transparent;text-align:left;color:var(--tx);font-family:inherit;margin-bottom:8px;}
.quiz-opt.correct{background:#E8F5E9;border-color:var(--g);color:#2E7D32;}
.quiz-opt.wrong{background:#FFEBEE;border-color:#E53935;color:#B71C1C;}
.quiz-opt:disabled{cursor:default;}
.quiz-fb{text-align:center;padding:10px;font-size:14px;font-weight:700;border-radius:10px;margin-bottom:10px;}
.quiz-fb.correct{background:#E8F5E9;color:#2E7D32;}
.quiz-fb.wrong{background:#FFEBEE;color:#B71C1C;}
.mode-tabs{display:flex;gap:8px;margin-bottom:18px;}
.mode-tab{flex:1;padding:10px 6px;border:1px solid var(--bd);border-radius:12px;font-size:12px;cursor:pointer;background:transparent;color:var(--tx2);font-family:inherit;text-align:center;white-space:nowrap;font-weight:500;}
.mode-tab.active{background:var(--g);color:#fff;border-color:var(--g);}
.w-topic{background:#E8F5E9;border-radius:12px;padding:16px;margin-bottom:14px;border:0.5px solid #C8E6C9;}
.textarea{width:100%;padding:12px 14px;border:1px solid var(--bd);border-radius:12px;font-size:15px;outline:none;font-family:inherit;background:var(--bg);color:var(--tx);resize:vertical;min-height:130px;line-height:1.6;}
.textarea:focus{border-color:var(--g);}
.c-ok{background:#E8F5E9;border:0.5px solid #C8E6C9;border-radius:10px;padding:14px;margin-bottom:10px;}
.c-fix{background:#FFF8E1;border:0.5px solid #FFE082;border-radius:10px;padding:14px;margin-bottom:10px;}
.c-lbl{font-size:11px;font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em;}
.c-ok .c-lbl{color:#2E7D32;}.c-fix .c-lbl{color:#E65100;}
.score-badge{display:inline-flex;align-items:center;gap:6px;background:#E8F5E9;border-radius:20px;padding:7px 16px;font-size:13px;color:#2E7D32;font-weight:700;margin-bottom:16px;}
.kw-chip{padding:6px 13px;background:var(--bg2);border:1px solid var(--bd);border-radius:20px;font-size:13px;color:var(--tx2);cursor:pointer;display:inline-block;margin:0 5px 6px 0;}
.kw-chip.used{background:#E8F5E9;border-color:var(--g);color:#2E7D32;}
.spk-lg{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:var(--g);color:#fff;border:none;border-radius:20px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:600;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.stat-card{background:var(--bg2);border-radius:12px;padding:16px;}
.stat-lbl{font-size:12px;color:var(--tx2);margin-bottom:4px;}
.stat-val{font-size:26px;font-weight:700;color:var(--tx);}
.week-dots{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;}
.day-dot{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;}
.day-done{background:#E8F5E9;color:#2E7D32;}.day-todo{background:var(--bg2);color:var(--tx3);}
.ebi-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:8px;}
.ebi-day{border-radius:8px;padding:5px 3px;text-align:center;font-size:11px;min-height:48px;}
.ebi-none{background:var(--bg2);color:var(--tx3);}.ebi-light{background:#E8F5E9;color:#2E7D32;}.ebi-med{background:#E3F2FD;color:#1565C0;}.ebi-heavy{background:#FFF8E1;color:#E65100;}.ebi-today{background:var(--g);color:#fff;font-weight:700;}
.empty-state{text-align:center;padding:48px 16px;color:var(--tx2);font-size:14px;line-height:1.8;}
.err-msg{font-size:13px;margin-bottom:10px;padding:10px 13px;background:#FFEBEE;color:#B71C1C;border-radius:10px;}
.loading-pulse{animation:pulse 1.2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.dict-result{border:1px solid var(--g);border-radius:12px;padding:16px;margin-top:12px;background:var(--gl);}
.sense-item{padding:6px 0;border-bottom:0.5px solid #C8E6C9;font-size:13px;color:var(--tx);}
.sense-item:last-child{border-bottom:none;}
.import-row{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:8px;margin-bottom:5px;font-size:13px;}
.import-row.pending{background:var(--bg2);}.import-row.active{background:#E3F2FD;animation:pulse 1s infinite;}.import-row.done{background:#E8F5E9;}.import-row.err{background:#FFEBEE;}.import-row.skip{background:var(--bg2);opacity:.55;}
/* lang setup */
.lang-card{border:2px solid var(--bd);border-radius:16px;padding:20px;margin-bottom:12px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:border-color .15s;}
.lang-card.active{border-color:var(--g);background:var(--gl);}
.toggle-switch{width:44px;height:26px;border-radius:13px;background:var(--bg3);position:relative;transition:background .2s;flex-shrink:0;}
.toggle-switch.on{background:var(--g);}
.toggle-switch::after{content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:#fff;top:3px;left:3px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.toggle-switch.on::after{transform:translateX(18px);}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-90px) scale(1.5)}}
/* 全屏作文输入 */
.writing-fullscreen{position:fixed;inset:0;background:var(--bg);z-index:50;display:flex;flex-direction:column;padding:0;}
.wf-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:0.5px solid var(--bd);flex-shrink:0;}
.wf-body{flex:1;display:flex;flex-direction:column;padding:12px 16px;gap:10px;overflow:hidden;}
.wf-textarea{flex:1;width:100%;padding:14px;border:1px solid var(--bd);border-radius:12px;font-size:16px;outline:none;font-family:inherit;background:var(--bg);color:var(--tx);resize:none;line-height:1.7;}
.wf-textarea:focus{border-color:var(--g);}
.wf-kw{display:flex;flex-wrap:wrap;gap:5px;padding:8px 0;}
.wf-footer{padding:10px 16px;border-top:0.5px solid var(--bd);flex-shrink:0;}
.celebrate{position:fixed;top:50%;left:50%;pointer-events:none;font-size:40px;animation:floatUp 1.2s ease-out forwards;z-index:999;}
</style>
</head>
<body>
<div class="app"><div id="root"></div></div>
<script>
const G='#4CAF50',GD='#388E3C',GL='#E8F5E9',N='#1a1f3c';
const LV_BG={A1:'#E8F5E9',A2:'#C8E6C9',B1:'#E3F2FD',B2:'#EDE7F6',C1:'#FFF8E1',C2:'#FCE4EC',N5:'#E8F5E9',N4:'#C8E6C9',N3:'#E3F2FD',N2:'#EDE7F6',N1:'#FFF8E1'};

  {word:"emprunter",lang:"fr"},{word:"surtout",lang:"fr"},{word:"songer",lang:"fr"},{word:"vertige",lang:"fr"},{word:"panique",lang:"fr"},{word:"merveilleux",lang:"fr"},{word:"interroger",lang:"fr"},{word:"pliage",lang:"fr"},{word:"espoir",lang:"fr"},{word:"escalader",lang:"fr"},{word:"obéir",lang:"fr"},{word:"absolu",lang:"fr"},{word:"éclair",lang:"fr"},{word:"dresser",lang:"fr"},{word:"tarder",lang:"fr"},{word:"sécurité",lang:"fr"},{word:"exécuter",lang:"fr"},{word:"honneur",lang:"fr"},{word:"royaume",lang:"fr"},{word:"pleur",lang:"fr"},

  ja:[{title:"社会問題について",sub:"谈谈一个社会问题",hint:"N3↑：〜によって、〜ため、〜に対して",kw:["問題になっている","影響を与える","解決するためには","一方で","増加している","社会全体","重要だと思う"]},{title:"日本の文化と私",sub:"日本文化与你的关联",hint:"N3↑：〜として、〜ことで、〜ながら",kw:["独特な文化","影響を受けた","伝統的な","変化してきた","興味を持った","〜に比べて","受け継がれている"]},{title:"将来の夢と目標",sub:"描述你的未来梦想和目标",hint:"N3↑：〜ようにする、〜ために、〜と考えている",kw:["将来は","努力している","実現するために","〜という夢","必要だと感じる","乗り越えて","貢献したい"]},{title:"環境問題と私たち",sub:"环境问题与我们的生活",hint:"N3↑：〜によって引き起こされる、〜べきだ",kw:["環境破壊","気候変動","取り組む必要がある","〜に悪影響を与える","省エネ","持続可能な","一人一人が"]},{title:"テクノロジーと生活の変化",sub:"科技对生活的改变",hint:"N3↑：〜に伴い、〜をもたらした、〜とともに",kw:["急速に発展した","利便性が高まった","〜に依存する","デメリットとして","生活様式","コミュニケーション","今後は"]}],

const lsSet=(k,v)=>{try{localStorage.setItem(k,v);}catch(e){}};
const lsDel=k=>{try{localStorage.removeItem(k);}catch(e){}};

let S={
  tab:'words',lang:'fr',view:'list',sel:null,

function todayStr(){return new Date().toISOString().slice(0,10);}
function dailyTopicIdx(len){
  // 日付をシードにして毎日違うトピックを返す（同じ日は同じトピック）
  const d=new Date();
  const seed=d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();
  // 言語コードも混ぜて法語・日語・英語で別のトピックになるように
  const langSeed={'fr':0,'ja':7,'en':13}[S.lang]||0;
  return(seed+langSeed)%len;
}
function todayEssays(){

// ── API (作文批改のみ) ──
async function callApi(prompt,maxTokens=1200){
  const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:maxTokens,messages:[{role:'user',content:prompt}]})});
  const d=await res.json();
  if(d.error)throw new Error(d.error.message);
  return d.content.map(i=>i.text||'').join('');
}

async function lookupJa(word){
  // Jishoはブラウザから直接呼べないのでVercelプロキシ経由
  const res=await fetch('/api/jisho?keyword='+encodeURIComponent(word));
  if(!res.ok)throw new Error('Jisho proxy error');
  const d=await res.json();
  if(!d.data||!d.data.length)throw new Error('見つかりませんでした');
  const entry=d.data[0];
  const jp=entry.japanese[0]||{};
  const senses=entry.senses||[];
  const jlpt=entry.jlpt&&entry.jlpt.length?entry.jlpt[0].replace('jlpt-','').toUpperCase():null;
  // 日本語の意味：英語定義をそのまま使用（Jishoは英語のみ）
  const allSenses=senses.slice(0,6).map((s,i)=>({
    num:i+1,pos:s.parts_of_speech.slice(0,2).join(', '),
    text:s.english_definitions.slice(0,4).join(', ')
  }));
  return{word:jp.word||word,reading:jp.reading||'',meanings:allSenses[0]?.text||'',allSenses,jlpt,delf:null,source:'Jisho'};
}

// 法语 → 中文Wiktionary（zh.wiktionary.org）
async function lookupFr(word){
  // zh.wiktionary.orgから法語→中文の定義を取得
  try{
    const res=await fetch('https://zh.wiktionary.org/api/rest_v1/page/definition/'+encodeURIComponent(word));
    if(res.ok){
      const d=await res.json();
      // zh.wiktionaryは言語コードで分かれている
      const frDefs=d.fr||[];
      if(frDefs.length>0){
        const allSenses=[];
        frDefs.forEach((def)=>{
          const pos=def.partOfSpeech||'';
          (def.definitions||[]).forEach((defItem,i)=>{
            // HTMLタグを除去して中国語の定義を取得
            const text=(defItem.definition||'').replace(/<[^>]*>/g,'').trim();
            if(text)allSenses.push({num:allSenses.length+1,pos,text,example:defItem.example||''});
          });
        });
        if(allSenses.length>0){
          const delf=guessDelf(word);
          return{word,reading:'',meanings:allSenses[0].text,allSenses:allSenses.slice(0,8),jlpt:null,delf,source:'中文Wiktionary'};
        }
      }
    }
  }catch(e){}

  // fallback: en.wiktionaryのfr定義
  try{
    const res=await fetch('https://en.wiktionary.org/api/rest_v1/page/definition/'+encodeURIComponent(word));
    if(res.ok){
      const d=await res.json();
      const frDefs=d.fr||[];
      if(frDefs.length>0){
        const allSenses=frDefs.slice(0,6).map((def,i)=>({
          num:i+1,pos:def.partOfSpeech||'',
          text:(def.definitions||[]).map(d=>(d.definition||'').replace(/<[^>]*>/g,'')).filter(Boolean).join('; ')
        })).filter(s=>s.text);
        if(allSenses.length>0){
          return{word,reading:'',meanings:allSenses[0].text,allSenses,jlpt:null,delf:guessDelf(word),source:'Wiktionary(EN)'};
        }
      }
    }
  }catch(e){}

  throw new Error('「'+word+'」が見つかりませんでした。スペルを確認してください。');
}

// 英語 → FreeDictionary
async function lookupEn(word){
  try{
    const res=await fetch('https://api.dictionaryapi.dev/api/v2/entries/en/'+encodeURIComponent(word));
    if(res.ok){
      const d=await res.json();
      if(Array.isArray(d)&&d.length){
        const entry=d[0];
        const phonetic=entry.phonetic||entry.phonetics?.find(p=>p.text)?.text||'';
        const allSenses=[];
        (entry.meanings||[]).forEach(m=>{
          (m.definitions||[]).slice(0,3).forEach(def=>{
            allSenses.push({pos:m.partOfSpeech,text:def.definition,example:def.example||''});
          });
        });
        return{word:entry.word||word,reading:phonetic,meanings:allSenses[0]?.text||'',allSenses:allSenses.slice(0,6),jlpt:null,delf:null,source:'FreeDictionary'};
      }
    }
  }catch(e){}
  throw new Error('「'+word+'」が見つかりませんでした。');
}

// 統合lookup関数
async function lookupFrEn(word,lang){
  if(lang==='fr')return lookupFr(word);
  return lookupEn(word);
}

function guessDelf(w){
  const common=['être','avoir','aller','faire','dire','voir','vouloir','pouvoir','savoir','venir','prendre','partir','mettre','aimer','manger','boire','dormir','maison','famille','ami','école','travail','ville','pays','jour','temps'];
  if(common.includes(w.toLowerCase()))return'A1';
  if(w.length<=6)return'A2';
  if(w.length<=9)return'B1';
  return'B2';
}

async function doLookup(){
  const inp=document.getElementById('addInput');
  const word=(inp?inp.value:S.addInput).trim();
  if(!word)return;
  S.addInput=word;S.addLoading=true;S.addResult=null;S.addErr='';render();
  try{
    const result=S.lang==='ja'?await lookupJa(word):await lookupFrEn(word,S.lang);
    S.addResult=result;
  }catch(e){S.addErr='「'+word+'」が見つかりませんでした。スペルを確認してください。';}
  S.addLoading=false;render();
}

// 各言語で最も自然な声を優先順位付きで選択
const VOICE_PREF={
  'fr':['Google français','Microsoft Julie','Amelie','Thomas','Marie','fr-FR'],
  'ja':['Google 日本語','Microsoft Haruka','Kyoko','Otoya','O-ren','ja-JP'],
  'en':['Google US English','Microsoft Zira','Samantha','Karen','en-US']
};
let _voiceCache={};
function getBestVoice(lang){
  if(_voiceCache[lang])return _voiceCache[lang];
  const voices=window.speechSynthesis.getVoices();
  const prefs=VOICE_PREF[lang]||[LANG_INFO[lang]?.code||'en-US'];
  const code=LANG_INFO[lang]?.code||'en-US';
  // 1. 名前で完全一致
  for(const p of prefs){const v=voices.find(x=>x.name===p);if(v){_voiceCache[lang]=v;return v;}}
  // 2. 名前の部分一致
  for(const p of prefs){const v=voices.find(x=>x.name.includes(p));if(v){_voiceCache[lang]=v;return v;}}
  // 3. 言語コード一致（online優先）
  const byLang=voices.filter(x=>x.lang.startsWith(code.slice(0,2)));
  const online=byLang.find(x=>!x.localService);
  if(online){_voiceCache[lang]=online;return online;}
  if(byLang[0]){_voiceCache[lang]=byLang[0];return byLang[0];}
  return null;
}
function speak(t,l){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t);
  u.lang=LANG_INFO[l]?.code||'en-US';
  u.rate=l==='ja'?0.8:0.82;
  u.pitch=1.0;
  const doSpeak=()=>{
    _voiceCache={};// キャッシュリセットして再取得
    const v=getBestVoice(l);
    if(v)u.voice=v;
    window.speechSynthesis.speak(u);
  };
  if(window.speechSynthesis.getVoices().length>0)doSpeak();
  else{window.speechSynthesis.onvoiceschanged=()=>{doSpeak();window.speechSynthesis.onvoiceschanged=null;};}
}

const FR_CONJ_SCHEMA='{"present":[{"p":"je","f":"","i":""},{"p":"tu","f":"","i":""},{"p":"il/elle","f":"","i":""},{"p":"nous","f":"","i":""},{"p":"vous","f":"","i":""},{"p":"ils","f":"","i":""}],"passe":[{"p":"j'ai","f":""},{"p":"tu as","f":""},{"p":"il a","f":""},{"p":"nous avons","f":""},{"p":"vous avez","f":""},{"p":"ils ont","f":""}],"imparfait":[{"p":"je","f":""},{"p":"nous","f":""},{"p":"ils","f":""}],"futur":[{"p":"je","f":""},{"p":"nous","f":""},{"p":"ils","f":""}]}';
const JA_CONJ_SCHEMA='{"基":[{"l":"辞書形","f":"","r":""},{"l":"ます形","f":"","r":""},{"l":"て形","f":"","r":""},{"l":"た形","f":"","r":""}],"否":[{"l":"ない形","f":"","r":""},{"l":"ません","f":"","r":""}],"他":[{"l":"可能","f":"","r":""},{"l":"意向","f":"","r":""},{"l":"条件","f":"","r":""}]}';

function isVerb(pos){
  if(!pos)return false;
  const p=pos.toLowerCase();
  return p.includes('verb')||p.includes('動詞')||p.includes('verbe')||p.includes('v.');
}
function isNoun(pos){
  if(!pos)return false;
  const p=pos.toLowerCase();
  return p.includes('noun')||p.includes('名詞')||p.includes('nom')||p.includes('n.');
}

function buildWordPrompt(word,meaning,lang,pos){
  const verb=isVerb(pos);
  const noun=isNoun(pos);
  if(lang==='fr'){
    const genderPart=noun?',"gender":{"masc":"","fem":null,"mascPl":"","irregular":false}':',"gender":null';
    const conjPart=verb?',"conjugations":'+FR_CONJ_SCHEMA:',"conjugations":null';
    return `FR单词「${word}」(${meaning})。JSON only:{"reading":"/IPA/"${genderPart},"examples":[{"text":"","trans":"中文"},{"text":"","trans":"中文"}],"grammar":"中文要点","related":"相关词","wordFamily":[{"word":"","pos":"","meaning":""},{"word":"","pos":"","meaning":""}]${conjPart},"collocations":[{"phrase":"","meaning":"中文"},{"phrase":"","meaning":"中文"},{"phrase":"","meaning":"中文"}]}`;
  }
  if(lang==='ja'){
    const conjPart=verb?',"conjugations":'+JA_CONJ_SCHEMA:',"conjugations":null';

      if(ai.grammar)d.grammar=ai.grammar;

// ── Rich content helpers ──
function conjH(c,lang){
  if(!c)return'';
  if(lang==='ja'){
    // 新旧両方のキー名に対応
    const jaLabels={'基本形':'基本形','否定形':'否定形','応用形':'応用形','基':'基本形','否':'否定形','他':'応用形'};
    return'<div class="sec-lbl">動詞活用</div>'+Object.entries(c).map(([t,rows])=>`<div class="conj-sec"><div style="font-size:11px;font-weight:700;color:var(--tx3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em">${jaLabels[t]||t}</div><table class="conj-table">${rows.map(r=>`<tr><th>${r.label||r.l||''}</th><td>${r.form||r.f||''} <span class="ipa">${r.reading||r.r||''}</span> ${spkH(r.form||r.f||'','ja','')}</td></tr>`).join('')}</table></div>`).join('');
  }
  // フランス語（新旧両方のキー名に対応）
  const nm={present:'現在形',passe:'複合過去',imparfait:'半過去',futur:'単純未来'};
  const ts=Object.keys(c);
  if(!ts.length)return'';
  if(!S.tense||!c[S.tense])S.tense=ts[0];
  const ac=S.tense;
  return`<div class="sec-lbl">動詞活用</div>
    <div class="tense-tabs">${ts.map(t=>`<button class="tense-tab${t===ac?' active':''}" onclick="S.tense='${t}';render()">${nm[t]||t}</button>`).join('')}</div>
    <div class="conj-sec"><table class="conj-table">${(c[ac]||[]).map(r=>{const pronoun=r.pronoun||r.p||'';const form=r.form||r.f||'';const ipa=r.ipa||r.i||'';return`<tr><th>${pronoun}</th><td>${form} <span class="ipa">${ipa}</span> ${spkH(pronoun+' '+form,'fr','')}</td></tr>`;}).join('')}</table></div>`;
}
function collocH(cs){
  if(!cs||!cs.length)return'';
  return`<div class="sec-lbl">よく使う表現</div><div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px">${cs.map(c=>`<span style="background:var(--bg2);border:0.5px solid var(--bd);border-radius:20px;padding:6px 12px;font-size:13px;cursor:default;color:var(--tx)">${c.phrase}${c.meaning?` <span style="font-size:11px;color:var(--tx3)">— ${c.meaning}</span>`:''}</span>`).join('')}</div>`;
}
function wordFamilyH(fam){
  if(!fam||!fam.length)return'';
  return`<div class="sec-lbl">語族展開</div>${fam.map(f=>`<div style="border:0.5px solid var(--bd);border-radius:10px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between"><div><span style="font-size:15px;font-weight:600;color:var(--tx)">${f.word}</span><span style="font-size:13px;color:var(--tx2);margin-left:8px">${f.meaning}</span></div><span style="font-size:11px;padding:2px 7px;border-radius:20px;background:var(--bg2);color:var(--tx2)">${f.pos}</span></div>`).join('')}`;
}

// 既存単語にAI情報を後から追加
async function enrichWord(id){
  const w=S.words.find(x=>x.id===id);if(!w)return;
  const d=w.data;
  const meaning=d.meaning||'';
  const langName={'fr':'法语','ja':'日语','en':'英语'}[w.lang]||'英语';
  const isFr=w.lang==='fr',isJa=w.lang==='ja';
  const prompt=buildWordPrompt(d.word,meaning,w.lang,d.allSenses?.[0]?.pos||'');
  // show loading in detail
  const sc=document.getElementById('screen');
  if(sc){const btn=sc.querySelector('button[onclick*="enrichWord"]');if(btn){btn.textContent='生成中...';btn.disabled=true;}}
  try{
    const t=await callApi(prompt,1000);
    const ai=JSON.parse(t.replace(/```json|```/g,'').trim());
    if(ai.reading&&!d.reading)d.reading=ai.reading;
    if(ai.gender)d.gender=ai.gender;
    if(ai.examples?.length)d.examples=ai.examples;
    if(ai.grammar)d.grammar=ai.grammar;
    if(ai.related)d.related=ai.related;
    if(ai.wordFamily?.length)d.wordFamily=ai.wordFamily;
    if(ai.conjugations)d.conjugations=ai.conjugations;
    if(ai.collocations?.length)d.collocations=ai.collocations;
    d.aiEnriched=true;
    saveWords();render();
  }catch(e){alert('AI生成に失敗しました: '+e.message);}
}

  S.wText=ins;

async function doWriting(){
  const txt=document.getElementById('wInput')?.value||S.wText;
  S.wText=txt;if(!txt.trim())return;

  // ── 毎日制限チェック ──
  const todayCount=revisionCountToday();
  if(todayCount>=1&&!S.wCurrentEssayId){
    // 今日すでに別の作文を書いた
    S.wErr='📅 今日はすでに1篇作文を書きました。明日（'+tomorrowStr()+'）また書いてみよう！';
    render();return;
  }
  if(todayCount>=3||(S.wCurrentRevCount!=null&&S.wCurrentRevCount>=3)){
    // 今日の修正が3回に達した
    S.wErr='✏️ 今日の添削は3回まで。よく頑張りました！明日（'+tomorrowStr()+'）また来てね 😊';
    render();return;
  }

  S.wLoad=true;S.wErr='';render();
  const topics=WRITING_TOPICS[S.lang]||WRITING_TOPICS['en'];
  const ti=S.wTopicIdx!==null?S.wTopicIdx:dailyTopicIdx(topics.length);
  const topic=topics[ti];
  const langName={'fr':'法语','ja':'日语','en':'英语'}[S.lang]||'英语';
  try{
    const t=await callApi('你是专业'+langName+'教师。请对以下'+langName+'作文进行详细添削。主题：「'+topic.title+'」\n\n'+txt.trim()+'\n\n返回JSON（不要markdown）：{"score":1-10,"corrected":"修正后完整文章","errors":[{"type":"错误类型","original":"原文片段","fixed":"正确写法","note":"简短说明"}],"praise":"做得好的地方"}');
    S.wResult=JSON.parse(t.replace(/```json|```/g,'').trim());
    // 修正回数カウント
    if(S.wCurrentRevCount==null)S.wCurrentRevCount=0;
    S.wCurrentRevCount++;
    const essayId=S.wCurrentEssayId||Date.now().toString();
    S.wCurrentEssayId=essayId;
    S.wHistory=[{id:Date.now().toString(),lang:S.lang,topic:topic.title,
      original:txt.trim(),result:S.wResult,score:S.wResult.score||null,
      date:Date.now(),essayId,revNum:S.wCurrentRevCount},...S.wHistory];
    saveEssays();
    S.wView='result';
  }catch(e){S.wErr='添削に失敗しました（'+e.message+'）';}
  S.wLoad=false;render();
}

async function startImport(){
  if(S.impRunning)return;S.impRunning=true;render();
  const existing=importedSet();
  const allForLang=IMPORT_LIST.filter(i=>i.lang===S.lang);
  const pending=allForLang.filter(i=>!existing.has(i.word.toLowerCase()));
  let done=0;
  for(let i=0;i<allForLang.length;i++){
    const item=allForLang[i];
    const rowEl=document.getElementById('ir'+i),stEl=document.getElementById('ist'+i);
    const pfEl=document.getElementById('impPf'),stTxt=document.getElementById('impSt');
    if(existing.has(item.word.toLowerCase())){done++;continue;}
    if(rowEl)rowEl.className='import-row active';if(stEl)stEl.textContent='⏳';
    if(stTxt)stTxt.textContent=(done+1)+'/'+pending.length+' 検索中: '+item.word;
    try{
      const result=item.lang==='ja'?await lookupJa(item.word):await lookupFrEn(item.word,item.lang);
      const nw={id:Date.now().toString()+i,word:item.word,lang:item.lang,
        data:{word:result.word,reading:result.reading||'',meaning:result.allSenses?.[0]?.text||result.meanings||'',
          delf:item.lang==='fr'?(result.delf||null):null,jlpt:item.lang==='ja'?(result.jlpt||null):null,
          gender:null,pluralNote:null,examples:[],grammar:'',related:'',wordFamily:[],conjugations:null,collocations:[],
          source:result.source,allSenses:result.allSenses||[]},
        reviewCount:0,mastered:false,addedAt:Date.now()-i*1000};
      S.words=[nw,...S.words];saveWords();existing.add(item.word.toLowerCase());
      if(rowEl)rowEl.className='import-row done';if(stEl)stEl.textContent='✓';
    }catch(e){if(rowEl)rowEl.className='import-row err';if(stEl)stEl.textContent='✗';}
    done++;if(pfEl)pfEl.style.width=Math.round(done/pending.length*100)+'%';
    await new Promise(r=>setTimeout(r,300));
  }
  S.impRunning=false;S.impDone=true;celebrate();celebrate();render();
}

function showLogin(){
  document.getElementById('root').innerHTML=`

    <div style="margin-bottom:28px">${logoFull()}</div>

    <div id="loginErr" style="font-size:13px;color:#B71C1C;min-height:16px;margin-bottom:12px"></div>
    <button class="btn" style="max-width:320px" onclick="doLogin()">ログイン / 新規作成</button>
    <div style="font-size:12px;color:var(--tx3);margin-top:18px;text-align:center">パスワード不要。このデバイスにのみ保存。</div>
  </div>`;
  document.getElementById('loginEmail')?.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
}

function doLogin(){
  const email=(document.getElementById('loginEmail')?.value||'').trim().toLowerCase();
  const err=document.getElementById('loginErr');
  if(!email||!/^[^@]+@[^@]+\.[^@]+$/.test(email)){if(err)err.textContent='有効なメールを入力してください';return;}
  U={email,sk:btoa(email).replace(/[^a-zA-Z0-9]/g,'').slice(0,24)};
  saveAuth();loadAll();
  // 初回セットアップ
  if(!ls('lingua-setup-done-'+U.sk)){document.getElementById('root').innerHTML=setupH();return;}
  showApp();
}

function loadAuth(){
  const r=ls('lingua-auth-v3');
  if(r){try{U=JSON.parse(r);loadAll();if(!ls('lingua-setup-done-'+U.sk)){document.getElementById('root').innerHTML=setupH();return;}showApp();}catch(e){showLogin();}}
  else showLogin();
}

function doLogout(){lsDel('lingua-auth-v3');U={email:'',sk:''};S.words=[];S.wHistory=[];showLogin();}

function showApp(){
  const langs=activeLangs();
  if(!S.enabledLangs[S.lang]&&langs.length)S.lang=langs[0];
  const initials=U.email.slice(0,2).toUpperCase();
  document.getElementById('root').innerHTML=`
  <div style="display:flex;flex-direction:column;min-height:100vh">
    <div class="top-bar">
      <div>${logoSmall()}</div>
      <div class="lang-toggle">
        ${langs.map(l=>`<button class="lang-btn${S.lang===l?' active':''}" data-lang="${l}" onclick="setLang('${l}')">${LANG_INFO[l].flag} ${LANG_INFO[l].label.slice(0,2)}</button>`).join('')}
      </div>
      <div class="user-pill" style="flex:none;max-width:110px">
        <div class="user-av">${initials}</div>
        <span class="user-em">${U.email}</span>
        <button class="logout-x" onclick="doLogout()">×</button>
      </div>
    </div>
    <div class="screen" id="screen"></div>
    <nav class="navbar">
      <div class="nav-item active" data-tab="words" onclick="switchTab('words')"><span class="nav-icon">📖</span>単語帳</div>
      <div class="nav-item" data-tab="practice" onclick="switchTab('practice')"><span class="nav-icon">✍️</span>練習</div>
      <div class="nav-item" data-tab="writing" onclick="switchTab('writing')"><span class="nav-icon">🖊️</span>作文</div>
      <div class="nav-item" data-tab="stats" onclick="switchTab('stats')"><span class="nav-icon">📊</span>統計</div>
    </nav>
  </div>`;
  render();
}

function render(){
  const sc=document.getElementById('screen');if(!sc)return;
  if(S.tab==='words'){
    if(S.view==='list')sc.innerHTML=wordsListH();
    else if(S.view==='detail')sc.innerHTML=detailH();
    else if(S.view==='add')sc.innerHTML=addH();
  }else if(S.tab==='practice')sc.innerHTML=practiceH();
  else if(S.tab==='writing')sc.innerHTML=writingH();
  else if(S.tab==='import')sc.innerHTML=importH();
  else sc.innerHTML=statsH();
}
function setView(v){S.view=v;if(v==='add'){S.addInput='';S.addResult=null;S.addErr='';S.addMemo='';S.addAiLoading=false;}render();}
function selWord(id){S.sel=S.words.find(w=>w.id===id);S.view='detail';render();}
function goPractice(){S.tab='practice';S.pMode='flash';resetP();render();document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.tab==='practice'));}

loadAuth();
</script>
</body>
</html>
