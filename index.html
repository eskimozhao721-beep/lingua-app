<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lingua">
<title>Lingua</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --g:#22c55e;--gd:#16a34a;--gl:#f0fdf4;--glb:#dcfce7;
  --n:#0f172a;--nb:#1e293b;
  --bg:#ffffff;--bg2:#f8fafc;--bg3:#f1f5f9;
  --tx:#0f172a;--tx2:#475569;--tx3:#94a3b8;
  --bd:#e2e8f0;--bd2:#cbd5e1;
  --r-sm:10px;--r-md:14px;--r-lg:20px;--r-xl:24px;
  --shadow-sm:0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 12px rgba(0,0,0,.08);
  --shadow-lg:0 8px 24px rgba(0,0,0,.12);
  --fr:#2563eb;--fr-bg:#eff6ff;--fr-light:#dbeafe;
  --ja:#dc2626;--ja-bg:#fef2f2;--ja-light:#fee2e2;
  --en:#7c3aed;--en-bg:#f5f3ff;--en-light:#ede9fe;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#0f172a;--bg2:#1e293b;--bg3:#334155;
  --tx:#f1f5f9;--tx2:#94a3b8;--tx3:#64748b;
  --bd:#334155;--bd2:#475569;
  --gl:#0f2a1a;--glb:#14532d;
  --fr-bg:#0f1d40;--fr-light:#1e3a5f;
  --ja-bg:#2d0f0f;--ja-light:#4a1515;
  --en-bg:#1a0f2e;--en-light:#2d1a4a;
  --shadow-sm:0 1px 3px rgba(0,0,0,.3);
  --shadow-md:0 4px 16px rgba(0,0,0,.4);
}}
body{
  background:var(--bg2);
  font-family:'SF Pro Text',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  min-height:100vh;display:flex;justify-content:center;
  -webkit-font-smoothing:antialiased;
}
.app{width:100%;max-width:430px;min-height:100svh;background:var(--bg);display:flex;flex-direction:column;position:relative;}

/* ── Top bar ── */
.top-bar{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;padding-top:max(10px,env(safe-area-inset-top));
  border-bottom:1px solid var(--bd);background:var(--bg);
  position:sticky;top:0;z-index:30;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.lang-seg{display:flex;background:var(--bg3);border-radius:9px;padding:2px;gap:2px;flex:1;}
.lang-btn{flex:1;padding:5px 8px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:transparent;font-family:inherit;color:var(--tx3);border-radius:7px;transition:all .18s cubic-bezier(.4,0,.2,1);white-space:nowrap;}
.lang-btn.active{background:var(--bg);color:var(--tx);box-shadow:var(--shadow-sm);}
.user-av{width:30px;height:30px;border-radius:50%;background:var(--n);display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:700;cursor:pointer;flex-shrink:0;border:2px solid var(--bd);}

/* ── Screen ── */
.screen{flex:1;overflow-y:auto;padding:20px 16px 100px;-webkit-overflow-scrolling:touch;}
.screen::-webkit-scrollbar{display:none;}

/* ── Nav bar ── */
.navbar{
  display:flex;border-top:1px solid var(--bd);background:var(--bg);
  position:sticky;bottom:0;z-index:30;
  padding-bottom:max(12px,0);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.nav-item{flex:1;text-align:center;padding:10px 0 2px;cursor:pointer;font-size:9.5px;font-weight:500;color:var(--tx3);letter-spacing:.02em;transition:color .15s;}
.nav-item.active{color:var(--g);}
.nav-icon{font-size:20px;display:block;margin-bottom:3px;}
.nav-item.active .nav-icon{transform:scale(1.08);transition:transform .2s cubic-bezier(.34,1.56,.64,1);}

/* ── Cards ── */
.card{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r-lg);padding:16px;margin-bottom:10px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow-sm);}
.card:active{transform:scale(.98);border-color:var(--g);box-shadow:var(--shadow-md);}
.card-flat{background:var(--bg2);border:none;border-radius:var(--r-lg);padding:14px 16px;margin-bottom:8px;}

/* ── Buttons ── */
.btn-primary{
  width:100%;padding:14px;background:var(--g);color:#fff;border:none;
  border-radius:var(--r-md);font-size:15px;cursor:pointer;font-weight:700;
  font-family:inherit;letter-spacing:-.01em;
  transition:all .15s;box-shadow:0 2px 8px rgba(34,197,94,.35);
}
.btn-primary:active{background:var(--gd);transform:scale(.98);}
.btn-primary:disabled{opacity:.45;cursor:default;transform:none;box-shadow:none;}
.btn-ghost{width:100%;padding:13px;background:transparent;color:var(--g);border:1.5px solid var(--g);border-radius:var(--r-md);font-size:14px;cursor:pointer;font-weight:600;font-family:inherit;}
.btn-ghost:active{background:var(--gl);}
.btn-back{display:inline-flex;align-items:center;gap:6px;background:var(--bg2);border:1px solid var(--bd);border-radius:22px;font-size:13px;color:var(--tx2);cursor:pointer;padding:7px 14px;margin-bottom:20px;font-family:inherit;font-weight:500;}
.btn-back:active{background:var(--bg3);}
.btn-icon{width:36px;height:36px;border-radius:50%;background:var(--bg2);border:1px solid var(--bd);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.btn-icon:active{background:var(--bg3);}
.add-card{width:100%;padding:14px;border:1.5px dashed var(--bd2);border-radius:var(--r-lg);background:transparent;font-size:14px;color:var(--tx3);cursor:pointer;margin-bottom:14px;font-family:inherit;font-weight:500;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s;}
.add-card:active{border-color:var(--g);color:var(--g);background:var(--gl);}

/* ── Inputs ── */
.inp{width:100%;padding:13px 16px;border:1.5px solid var(--bd);border-radius:var(--r-md);font-size:16px;outline:none;font-family:inherit;background:var(--bg);color:var(--tx);transition:border-color .15s;}
.inp:focus{border-color:var(--g);}
.inp-lbl{font-size:12px;font-weight:600;color:var(--tx2);margin-bottom:6px;display:block;letter-spacing:.03em;}
.inp-group{margin-bottom:16px;}
.textarea{width:100%;padding:14px 16px;border:1.5px solid var(--bd);border-radius:var(--r-md);font-size:15px;outline:none;font-family:inherit;background:var(--bg);color:var(--tx);resize:none;line-height:1.7;transition:border-color .15s;}
.textarea:focus{border-color:var(--g);}

/* ── Tags & badges ── */
.tag{display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;}
.tag-fr{background:var(--fr-bg);color:var(--fr);}
.tag-ja{background:var(--ja-bg);color:var(--ja);}
.tag-en{background:var(--en-bg);color:var(--en);}
.lv{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:700;}
.pill{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500;background:var(--bg3);color:var(--tx2);}
.badge-green{background:var(--glb);color:var(--gd);font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;}
.badge-warn{background:#fff7ed;color:#c2410c;font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;}
.badge-err{background:#fef2f2;color:#dc2626;font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;}

/* ── Section labels ── */
.sec{font-size:10.5px;font-weight:700;letter-spacing:.08em;color:var(--tx3);margin:22px 0 10px;text-transform:uppercase;}

/* ── Content blocks ── */
.blk{background:var(--bg2);border-radius:var(--r-md);padding:13px 16px;margin-bottom:10px;line-height:1.65;font-size:14px;color:var(--tx2);}
.ex-blk{background:var(--bg2);border-radius:var(--r-md);padding:13px 16px;margin-bottom:8px;border-left:3px solid var(--g);}
.sense-row{padding:7px 0;border-bottom:1px solid var(--bd);font-size:13px;color:var(--tx);}
.sense-row:last-child{border-bottom:none;}

/* ── Speak button ── */
.spk{background:none;border:1px solid var(--bd);border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;color:var(--g);font-family:inherit;display:inline-flex;align-items:center;gap:4px;font-weight:500;}
.spk:active{background:var(--gl);}
.spk-pill{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;background:var(--g);color:#fff;border:none;border-radius:20px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:600;box-shadow:0 2px 8px rgba(34,197,94,.3);}

/* ── Conj tables ── */
.tense-rail{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;}
.tense-tab{padding:5px 12px;font-size:12px;border:1px solid var(--bd);border-radius:20px;cursor:pointer;background:transparent;font-family:inherit;color:var(--tx2);font-weight:500;transition:all .15s;}
.tense-tab.on{background:var(--n);color:#fff;border-color:var(--n);}
.conj-box{background:var(--bg2);border-radius:var(--r-md);padding:12px 14px;margin-bottom:8px;}
.conj-tbl{width:100%;border-collapse:collapse;font-size:13px;}
.conj-tbl th{text-align:left;color:var(--tx3);font-weight:500;padding:6px 8px 6px 0;font-size:12px;width:36%;}
.conj-tbl td{color:var(--tx);padding:6px 0;border-bottom:1px solid var(--bd);}
.conj-tbl tr:last-child td{border-bottom:none;}
.ipa{font-size:11px;color:var(--tx3);margin-left:5px;}

/* ── Flash cards ── */
.flash{border:2px solid var(--bd);border-radius:var(--r-xl);padding:36px 24px;text-align:center;cursor:pointer;min-height:230px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:16px;transition:all .2s;box-shadow:var(--shadow-sm);}
.flash:active{transform:scale(.97);}
.flash-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn-no{padding:14px;background:#fef2f2;color:#dc2626;border:none;border-radius:var(--r-md);font-size:14px;cursor:pointer;font-weight:700;font-family:inherit;}
.btn-no:active{background:#fee2e2;}
.btn-yes{padding:14px;background:var(--gl);color:var(--gd);border:none;border-radius:var(--r-md);font-size:14px;cursor:pointer;font-weight:700;font-family:inherit;}
.btn-yes:active{background:var(--glb);}

/* ── Progress bar ── */
.pbar{height:3px;background:var(--bg3);border-radius:2px;margin-bottom:18px;overflow:hidden;}
.pbar-fill{height:100%;background:var(--g);border-radius:2px;transition:width .4s cubic-bezier(.4,0,.2,1);}

/* ── Quiz ── */
.q-opt{width:100%;padding:13px 16px;border:1.5px solid var(--bd);border-radius:var(--r-md);font-size:14px;cursor:pointer;background:transparent;text-align:left;color:var(--tx);font-family:inherit;margin-bottom:8px;transition:all .15s;}
.q-opt:active:not(:disabled){background:var(--bg2);}
.q-opt.ok{background:var(--gl);border-color:var(--g);color:var(--gd);font-weight:600;}
.q-opt.no{background:#fef2f2;border-color:#dc2626;color:#dc2626;font-weight:600;}
.q-opt:disabled{cursor:default;}
.q-fb{text-align:center;padding:10px 14px;font-size:14px;font-weight:700;border-radius:var(--r-md);margin-bottom:10px;}
.q-fb.ok{background:var(--gl);color:var(--gd);}
.q-fb.no{background:#fef2f2;color:#dc2626;}

/* ── Mode tabs ── */
.mode-rail{display:flex;gap:8px;margin-bottom:18px;}
.mode-btn{flex:1;padding:10px 6px;border:1.5px solid var(--bd);border-radius:var(--r-md);font-size:12px;cursor:pointer;background:transparent;color:var(--tx2);font-family:inherit;text-align:center;font-weight:600;transition:all .15s;}
.mode-btn.on{background:var(--g);color:#fff;border-color:var(--g);box-shadow:0 2px 8px rgba(34,197,94,.3);}

/* ── Writing ── */
.topic-card{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:1px solid #bbf7d0;border-radius:var(--r-lg);padding:18px;margin-bottom:14px;}
.kw-chip{padding:5px 12px;background:rgba(255,255,255,.7);border:1px solid #bbf7d0;border-radius:20px;font-size:13px;color:#166534;cursor:pointer;display:inline-block;margin:0 5px 6px 0;font-weight:500;backdrop-filter:blur(4px);}
.kw-chip.used{background:var(--g);border-color:var(--g);color:#fff;}
.c-ok{background:var(--gl);border:1px solid #bbf7d0;border-radius:var(--r-md);padding:14px;margin-bottom:10px;}
.c-fix{background:#fff7ed;border:1px solid #fed7aa;border-radius:var(--r-md);padding:14px;margin-bottom:10px;}
.c-lbl{font-size:10px;font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:.07em;}
.c-ok .c-lbl{color:#16a34a;}.c-fix .c-lbl{color:#c2410c;}
.score-row{display:inline-flex;align-items:center;gap:8px;background:var(--gl);border-radius:24px;padding:8px 18px;font-size:14px;color:var(--gd);font-weight:700;margin-bottom:18px;}

/* ── Fullscreen writing ── */
.wf-wrap{position:fixed;inset:0;background:var(--bg);z-index:50;display:flex;flex-direction:column;}
.wf-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;padding-top:max(14px,env(safe-area-inset-top));border-bottom:1px solid var(--bd);flex-shrink:0;}
.wf-body{flex:1;display:flex;flex-direction:column;padding:14px 16px;gap:10px;overflow:hidden;}
.wf-ta{flex:1;width:100%;padding:14px;border:1.5px solid var(--bd);border-radius:var(--r-md);font-size:16px;outline:none;font-family:inherit;background:var(--bg);color:var(--tx);resize:none;line-height:1.75;}
.wf-ta:focus{border-color:var(--g);}
.wf-foot{padding:12px 16px;padding-bottom:max(12px,env(safe-area-inset-bottom));border-top:1px solid var(--bd);flex-shrink:0;}

/* ── Stats ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.stat-box{background:var(--bg2);border-radius:var(--r-lg);padding:16px 18px;}
.stat-n{font-size:28px;font-weight:800;color:var(--tx);letter-spacing:-.02em;}
.stat-l{font-size:12px;color:var(--tx3);margin-top:2px;font-weight:500;}

/* ── Lang toggle card ── */
.lang-card{border:1.5px solid var(--bd);border-radius:var(--r-lg);padding:16px 18px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:all .18s;}
.lang-card.on{border-color:var(--g);background:var(--gl);}
.sw{width:46px;height:27px;border-radius:14px;background:var(--bd2);position:relative;transition:background .22s;flex-shrink:0;}
.sw.on{background:var(--g);}
.sw::after{content:'';position:absolute;width:21px;height:21px;border-radius:50%;background:#fff;top:3px;left:3px;transition:transform .22s cubic-bezier(.34,1.56,.64,1);box-shadow:0 1px 4px rgba(0,0,0,.2);}
.sw.on::after{transform:translateX(19px);}

/* ── Import rows ── */
.imp-row{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:var(--r-sm);margin-bottom:5px;font-size:13px;}
.imp-row.pending{background:var(--bg2);}
.imp-row.running{background:#eff6ff;animation:pulse 1s infinite;}
.imp-row.done{background:var(--gl);}
.imp-row.err{background:#fef2f2;}
.imp-row.skip{background:var(--bg2);opacity:.5;}

/* ── Empty states ── */
.empty{text-align:center;padding:56px 20px;color:var(--tx3);line-height:1.8;}
.empty-icon{font-size:40px;margin-bottom:12px;display:block;}

/* ── Ebbinghaus ── */
.ebi-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:10px;}
.ebi-cell{border-radius:7px;padding:4px 2px;text-align:center;font-size:11px;min-height:46px;}
.ebi-0{background:var(--bg3);color:var(--tx3);}
.ebi-1{background:#dcfce7;color:#166534;}
.ebi-2{background:#dbeafe;color:#1e40af;}
.ebi-3{background:#fff7ed;color:#c2410c;}
.ebi-t{background:var(--g);color:#fff;font-weight:700;}

/* ── Dict result ── */
.dict-box{border:1.5px solid var(--g);border-radius:var(--r-lg);padding:18px;margin-top:14px;background:var(--gl);}

/* ── Colloc chips ── */
.colloc-chip{display:inline-flex;align-items:center;background:var(--bg2);border:1px solid var(--bd);border-radius:20px;padding:6px 12px;font-size:13px;margin:0 5px 6px 0;cursor:default;color:var(--tx);}

/* ── Word family rows ── */
.fam-row{border:1px solid var(--bd);border-radius:var(--r-md);padding:11px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}

/* ── Sort bar ── */
.sort-rail{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;}
.sort-rail::-webkit-scrollbar{display:none;}
.sort-btn{padding:6px 14px;font-size:12px;border:1px solid var(--bd);border-radius:20px;background:transparent;cursor:pointer;font-family:inherit;color:var(--tx2);white-space:nowrap;font-weight:500;flex-shrink:0;transition:all .15s;}
.sort-btn.on{background:var(--n);color:#fff;border-color:var(--n);}

/* ── Errors ── */
.err-box{font-size:13px;padding:10px 14px;background:#fef2f2;color:#dc2626;border-radius:var(--r-md);margin-bottom:10px;border:1px solid #fecaca;}

/* ── AI loading ── */
.ai-loading{background:#fff7ed;border:1px solid #fed7aa;border-radius:var(--r-md);padding:16px;text-align:center;margin-bottom:10px;}
.ai-loading p{font-size:14px;color:#c2410c;font-weight:500;}
.ai-loading small{font-size:12px;color:var(--tx3);margin-top:4px;display:block;}

/* ── Animations ── */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-100px) scale(1.6)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.loading{animation:pulse 1.3s infinite;}
.fade-in{animation:fadeIn .25s ease-out;}
.celebrate{position:fixed;top:45%;left:50%;pointer-events:none;font-size:44px;animation:floatUp 1.3s ease-out forwards;z-index:999;}
</style>
</head>
<body>
<div class="app"><div id="root"></div></div>
<script>
'use strict';
/* ═══════════════════════════════════════
   Lingua — Production build
   Vocabulary app for FR / JA / EN learners
   ═══════════════════════════════════════ */

// ── Constants ──
const G='#22c55e',N='#0f172a';
const LV_BG={A1:'#dcfce7',A2:'#bbf7d0',B1:'#dbeafe',B2:'#ede9fe',C1:'#fff7ed',C2:'#fee2e2',N5:'#dcfce7',N4:'#bbf7d0',N3:'#dbeafe',N2:'#ede9fe',N1:'#fff7ed'};
const LV_FG={A1:'#166534',A2:'#14532d',B1:'#1e40af',B2:'#4c1d95',C1:'#c2410c',C2:'#991b1b',N5:'#166534',N4:'#14532d',N3:'#1e40af',N2:'#4c1d95',N1:'#c2410c'};
const LV_ORD={A1:1,A2:2,B1:3,B2:4,C1:5,C2:6,N5:1,N4:2,N3:3,N2:4,N1:5};
const EBI=[1,3,7,14];

const LANG={
  fr:{label:'フランス語',flag:'🇫🇷',short:'FR',lcode:'fr-FR',color:'#2563eb',bg:'var(--fr-bg)'},
  ja:{label:'日本語',flag:'🇯🇵',short:'JA',lcode:'ja-JP',color:'#dc2626',bg:'var(--ja-bg)'},
  en:{label:'英語',flag:'🇬🇧',short:'EN',lcode:'en-US',color:'#7c3aed',bg:'var(--en-bg)'}
};

// ── Conj schemas (compact, j'ai stored as jai, restored on render) ──
const FR_CONJ='{"present":[{"p":"je","f":"","i":""},{"p":"tu","f":"","i":""},{"p":"il/elle","f":"","i":""},{"p":"nous","f":"","i":""},{"p":"vous","f":"","i":""},{"p":"ils/elles","f":"","i":""}],"passe":[{"p":"jai","f":""},{"p":"tu as","f":""},{"p":"il a","f":""},{"p":"nous avons","f":""},{"p":"vous avez","f":""},{"p":"ils ont","f":""}],"imparfait":[{"p":"je","f":""},{"p":"tu","f":""},{"p":"nous","f":""},{"p":"ils/elles","f":""}],"futur":[{"p":"je","f":""},{"p":"tu","f":""},{"p":"nous","f":""},{"p":"ils/elles","f":""}]}';
const JA_CONJ='{"基本":[{"l":"辞書形","f":"","r":""},{"l":"ます形","f":"","r":""},{"l":"て形","f":"","r":""},{"l":"た形","f":"","r":""}],"否定":[{"l":"ない形","f":"","r":""},{"l":"ません","f":"","r":""}],"応用":[{"l":"可能形","f":"","r":""},{"l":"意向形","f":"","r":""},{"l":"条件形","f":"","r":""}]}';

// ── API call (server proxy, writing correction only) ──
async function api(prompt,maxTok=1000){
  const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:maxTok,messages:[{role:'user',content:prompt}]})});
  const d=await r.json();
  if(d.error)throw new Error(d.error.message);
  return d.content.map(i=>i.text||'').join('');
}

// ── Dictionary APIs ──
async function dictJa(word){
  const r=await fetch('/api/jisho?keyword='+encodeURIComponent(word));
  if(!r.ok)throw new Error('辞書エラー');
  const d=await r.json();
  if(!d.data?.length)throw new Error('見つかりません');
  const e=d.data[0],jp=e.japanese[0]||{},sens=e.senses||[];
  const jlpt=e.jlpt?.length?e.jlpt[0].replace('jlpt-','').toUpperCase():null;
  const senses=sens.slice(0,6).map((s,i)=>({
    n:i+1,pos:s.parts_of_speech.slice(0,2).join(', '),
    text:s.english_definitions.slice(0,4).join(', ')
  }));
  return{word:jp.word||word,reading:jp.reading||'',meaning:senses[0]?.text||'',senses,jlpt,delf:null,src:'Jisho'};
}

async function dictFr(word){
  // Try zh.wiktionary first for Chinese definitions
  try{
    const r=await fetch('https://zh.wiktionary.org/api/rest_v1/page/definition/'+encodeURIComponent(word));
    if(r.ok){
      const d=await r.json();
      const defs=d.fr||[];
      if(defs.length){
        const senses=[];
        defs.forEach(def=>{
          const pos=def.partOfSpeech||'';
          (def.definitions||[]).forEach(di=>{
            const t=(di.definition||'').replace(/<[^>]*>/g,'').trim();
            if(t)senses.push({n:senses.length+1,pos,text:t});
          });
        });
        if(senses.length)return{word,reading:'',meaning:senses[0].text,senses:senses.slice(0,8),jlpt:null,delf:guessDelf(word),src:'中文Wiktionary'};
      }
    }
  }catch{}
  // Fallback: en.wiktionary fr section
  try{
    const r=await fetch('https://en.wiktionary.org/api/rest_v1/page/definition/'+encodeURIComponent(word));
    if(r.ok){
      const d=await r.json();
      const defs=d.fr||[];
      if(defs.length){
        const senses=defs.slice(0,6).map((def,i)=>({
          n:i+1,pos:def.partOfSpeech||'',
          text:(def.definitions||[]).map(d=>(d.definition||'').replace(/<[^>]*>/g,'')).filter(Boolean).join('; ')
        })).filter(s=>s.text);
        if(senses.length)return{word,reading:'',meaning:senses[0].text,senses,jlpt:null,delf:guessDelf(word),src:'Wiktionary'};
      }
    }
  }catch{}
  throw new Error('「'+word+'」が見つかりません');
}

async function dictEn(word){
  const r=await fetch('https://api.dictionaryapi.dev/api/v2/entries/en/'+encodeURIComponent(word));
  if(!r.ok)throw new Error('見つかりません');
  const d=await r.json();
  if(!Array.isArray(d)||!d.length)throw new Error('見つかりません');
  const e=d[0];
  const phonetic=e.phonetic||e.phonetics?.find(p=>p.text)?.text||'';
  const senses=[];
  (e.meanings||[]).forEach(m=>(m.definitions||[]).slice(0,3).forEach(def=>{
    senses.push({pos:m.partOfSpeech,text:def.definition,ex:def.example||''});
  }));
  return{word:e.word||word,reading:phonetic,meaning:senses[0]?.text||'',senses:senses.slice(0,6),jlpt:null,delf:null,src:'FreeDictionary'};
}

function guessDelf(w){
  const A1=['être','avoir','aller','faire','dire','voir','vouloir','pouvoir','savoir','venir','prendre','partir','mettre','aimer','manger','boire','dormir','maison','famille','ami','école','travail','ville','pays','jour','temps','homme','femme','enfant'];
  if(A1.includes(w.toLowerCase()))return'A1';
  if(w.length<=5)return'A2';
  if(w.length<=8)return'B1';
  return'B2';
}

// ── Prompt builder (minimal tokens) ──
function isVerb(pos=''){const p=pos.toLowerCase();return p.includes('verb')||p.includes('動詞')||p.includes('verbe');}
function isNoun(pos=''){const p=pos.toLowerCase();return p.includes('noun')||p.includes('名詞')||p.includes('nom');}

function buildPrompt(word,meaning,lang,pos){
  const v=isVerb(pos),n=isNoun(pos);
  if(lang==='fr'){
    const g=n?',"g":{"m":"","f":null,"mpl":"","irr":false}':',"g":null';
    const c=v?',"conj":'+FR_CONJ:',"conj":null';
    return`FR:「${word}」(${meaning})。JSON only:{"ipa":"/IPA/"${g},"ex":[{"t":"","zh":"中文"},{"t":"","zh":"中文"}],"gram":"中文语法要点","rel":"相关词","fam":[{"w":"","pos":"","zh":""},{"w":"","pos":"","zh":""}]${c},"col":[{"ph":"","zh":"中文"},{"ph":"","zh":"中文"},{"ph":"","zh":"中文"}]}`;
  }
  if(lang==='ja'){
    const c=v?',"conj":'+JA_CONJ:',"conj":null';
    return`JA:「${word}」(${meaning})。JSON only:{"read":"假名(罗马字)","ex":[{"t":"","zh":"中文"},{"t":"","zh":"中文"}],"gram":"中文语法要点","rel":"相关词","fam":[{"w":"","pos":"","zh":""},{"w":"","pos":"","zh":""}]${c},"col":[{"ph":"","zh":"中文"},{"ph":"","zh":"中文"},{"ph":"","zh":"中文"}]}`;
  }
  return`EN:「${word}」(${meaning})。JSON only:{"ipa":"/IPA/","ex":[{"t":"","zh":"中文"},{"t":"","zh":"中文"}],"gram":"中文语法要点","rel":"related","fam":[{"w":"","pos":"","zh":""},{"w":"","pos":"","zh":""}],"conj":null,"col":[{"ph":"","zh":"中文"},{"ph":"","zh":"中文"},{"ph":"","zh":"中文"}]}`;
}

function mergeAI(d,ai,lang){
  if(!ai)return;
  // common
  if(ai.ex?.length)d.examples=ai.ex.map(e=>({text:e.t||'',trans:e.zh||''}));
  if(ai.gram)d.grammar=ai.gram;
  if(ai.rel)d.related=ai.rel;
  if(ai.fam?.length)d.wordFamily=ai.fam.map(f=>({word:f.w,pos:f.pos,meaning:f.zh}));
  if(ai.col?.length)d.collocations=ai.col.map(c=>({phrase:c.ph,meaning:c.zh}));
  if(ai.conj)d.conjugations=ai.conj;
  // fr specific
  if(lang==='fr'){
    if(ai.ipa)d.reading=ai.ipa;
    if(ai.g)d.gender=ai.g;
  }
  // ja specific
  if(lang==='ja'&&ai.read)d.reading=ai.read;
  // en
  if(lang==='en'&&ai.ipa)d.reading=ai.ipa;
  d.aiOk=true;
}

async function confirmAdd(){
  const r=S.addRes;if(!r)return;
  const memo=(document.getElementById('addMemo')?.value||S.addMemo||'').trim();
  const meaning=memo||r.meaning||r.senses?.[0]?.text||'';
  const isFr=S.lang==='fr',isJa=S.lang==='ja';
  const nw={
    id:Date.now().toString(),word:r.word,lang:S.lang,
    data:{word:r.word,reading:r.reading||'',meaning,
      delf:isFr?r.delf||null:null,jlpt:isJa?r.jlpt||null:null,
      gender:null,examples:[],grammar:'',related:'',wordFamily:[],conjugations:null,collocations:[],
      senses:r.senses||[],src:r.src,aiOk:false},
    reviewCount:0,mastered:false,addedAt:Date.now()
  };
  S.words=[nw,...S.words];saveW();
  S.addAiLoad=true;render();
  try{
    const pos=r.senses?.[0]?.pos||'';
    const txt=await api(buildPrompt(r.word,meaning,S.lang,pos),1000);
    const ai=JSON.parse(txt.replace(/```json|```/g,'').trim());
    const idx=S.words.findIndex(w=>w.id===nw.id);
    if(idx>=0){mergeAI(S.words[idx].data,ai,S.lang);saveW();}
  }catch(e){console.warn('AI enrich failed:',e.message);}
  S.addAiLoad=false;S.addW='';S.addRes=null;S.addErr='';S.addMemo='';
  celebrate();setView('list');
}

async function enrichWord(id){
  const w=S.words.find(x=>x.id===id);if(!w)return;
  const d=w.data;
  const prompt=buildPrompt(d.word,d.meaning,w.lang,d.senses?.[0]?.pos||'');
  const sc=document.getElementById('screen');
  const btn=sc?.querySelector('[data-enrich]');
  if(btn){btn.textContent='生成中...';btn.disabled=true;}
  try{
    const txt=await api(prompt,1000);
    const ai=JSON.parse(txt.replace(/```json|```/g,'').trim());
    mergeAI(d,ai,w.lang);saveW();render();
  }catch(e){alert('AI生成に失敗: '+e.message);}
}

// ── TTS ──
const VOICES_PREF={fr:['Google français','Amelie','Thomas','Julie'],ja:['Google 日本語','Kyoko','Otoya','O-ren'],en:['Google US English','Samantha','Karen','Zira']};
let _vc={};
function getBestVoice(lang){
  if(_vc[lang])return _vc[lang];
  const vs=speechSynthesis.getVoices();
  const prefs=VOICES_PREF[lang]||[];
  const code=LANG[lang]?.lcode||'en-US';
  for(const p of prefs){const v=vs.find(x=>x.name===p);if(v){_vc[lang]=v;return v;}}
  for(const p of prefs){const v=vs.find(x=>x.name.includes(p));if(v){_vc[lang]=v;return v;}}
  const byLang=vs.filter(x=>x.lang.startsWith(code.slice(0,2)));
  const v=byLang.find(x=>!x.localService)||byLang[0];
  if(v){_vc[lang]=v;}return v||null;
}
function speak(t,l){
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t);
  u.lang=LANG[l]?.lcode||'ja-JP';
  u.rate=l==='ja'?0.82:0.85;u.pitch=1;
  const go=()=>{_vc={};const v=getBestVoice(l);if(v)u.voice=v;speechSynthesis.speak(u);};
  if(speechSynthesis.getVoices().length)go();
  else{speechSynthesis.onvoiceschanged=()=>{go();speechSynthesis.onvoiceschanged=null;};}
}

function activeLangs(){return Object.entries(S.enabledLangs).filter(([,v])=>v).map(([k])=>k);}
function todayStr(){return new Date().toISOString().slice(0,10);}
function dailyTopicIdx(len){
  const d=new Date();
  const seed=d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();
  const ls2={'fr':0,'ja':7,'en':13}[S.lang]||0;
  return(seed+ls2)%len;
}
function revCountToday(){
  const t=todayStr();
  return S.wHistory.filter(e=>e.lang===S.lang&&new Date(e.date).toISOString().slice(0,10)===t).length;
}
function tomorrowLabel(){
  const d=new Date();d.setDate(d.getDate()+1);

}
function importedSet(){
  const s=new Set();
  S.words.forEach(w=>{if(w.word)s.add(w.word.toLowerCase());if(w.data?.word)s.add(w.data.word.toLowerCase());});
  return s;
}
function sortedWords(){
  const ws=S.words.filter(w=>w.lang===S.lang);
  if(S.sortMode==='mastery')return[...ws].sort((a,b)=>{const d=(b.mastered?1:0)-(a.mastered?1:0);return d||b.reviewCount-a.reviewCount;});
  if(S.sortMode==='level')return[...ws].sort((a,b)=>(LV_ORD[a.data?.jlpt||a.data?.delf]||99)-(LV_ORD[b.data?.jlpt||b.data?.delf]||99));
  return[...ws].sort((a,b)=>b.addedAt-a.addedAt);
}
function celebrate(){
  ['🌸','✨','🎉','💖'].forEach((em,i)=>setTimeout(()=>{
    const el=document.createElement('div');el.className='celebrate';
    el.textContent=em;el.style.marginLeft=(-40+Math.random()*80)+'px';
    document.body.appendChild(el);setTimeout(()=>el.remove(),1400);
  },i*130));
}
