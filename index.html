<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --g:#22C55E;--gd:#16A34A;--gl:#F0FDF4;--glb:#DCFCE7;
  --n:#0F172A;--nb:#1E293B;
  --blue:#3B82F6;--blueb:#EFF6FF;
  --amber:#F59E0B;--amberb:#FFFBEB;
  --red:#EF4444;--redb:#FEF2F2;
  --purple:#8B5CF6;--purpleb:#F5F3FF;
  --bg:#FFFFFF;--bg2:#F8FAFC;--bg3:#F1F5F9;
  --tx:#0F172A;--tx2:#475569;--tx3:#94A3B8;
  --bd:rgba(15,23,42,0.08);--bd2:rgba(15,23,42,0.15);
  --shadow:0 1px 3px rgba(0,0,0,0.07),0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 4px 6px -1px rgba(0,0,0,0.08),0 2px 4px -1px rgba(0,0,0,0.04);
  --shadow-lg:0 10px 15px -3px rgba(0,0,0,0.08),0 4px 6px -2px rgba(0,0,0,0.04);
  --r:14px;--r-sm:10px;--r-full:999px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#0F172A;--bg2:#1E293B;--bg3:#334155;
    --tx:#F1F5F9;--tx2:#94A3B8;--tx3:#475569;
    --bd:rgba(255,255,255,0.08);--bd2:rgba(255,255,255,0.15);
    --gl:#052e16;--glb:#14532d;
    --blueb:#1e3a5f;--amberb:#451a03;--redb:#450a0a;--purpleb:#2e1065;
  }
}
body{background:var(--bg2);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;height:100dvh;display:flex;justify-content:center;overflow:hidden;line-height:1.5;}
.app{width:100%;max-width:430px;height:100dvh;background:var(--bg);display:flex;flex-direction:column;box-shadow:var(--shadow-lg);overflow:hidden;}

/* ── Top bar ── */
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;padding-top:max(10px,env(safe-area-inset-top));border-bottom:1px solid var(--bd);background:var(--bg);flex-shrink:0;position:sticky;top:0;z-index:30;gap:8px;backdrop-filter:blur(12px);}
.lang-toggle{display:flex;background:var(--bg2);border-radius:10px;padding:3px;gap:2px;overflow-x:auto;flex-shrink:0;}
.lang-toggle::-webkit-scrollbar{display:none;}
.lang-btn{padding:5px 11px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:transparent;font-family:inherit;color:var(--tx2);border-radius:8px;white-space:nowrap;transition:all .18s;}
.lang-btn.active{background:var(--n);color:#fff;box-shadow:var(--shadow);}
.user-pill{display:flex;align-items:center;gap:5px;background:var(--bg2);border-radius:var(--r-full);padding:4px 10px 4px 4px;min-width:0;flex:1;border:1px solid var(--bd);}
.user-av{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--g),var(--blue));display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:700;flex-shrink:0;}
.user-em{font-size:11px;color:var(--tx2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.logout-x{font-size:14px;color:var(--tx3);cursor:pointer;background:none;border:none;padding:2px 0 2px 4px;line-height:1;}

/* ── Screen ── */
.screen{flex:1;overflow-y:auto;padding:20px 16px 20px;-webkit-overflow-scrolling:touch;scroll-behavior:smooth;}

/* ── Navbar ── */
.navbar{display:flex;border-top:1px solid var(--bd);background:var(--bg);position:sticky;bottom:0;z-index:30;}
.nav-item{padding-bottom:calc(12px + env(safe-area-inset-bottom,0px));}
.nav-item{flex:1;text-align:center;padding:10px 0;cursor:pointer;font-size:10px;color:var(--tx3);transition:color .18s;font-weight:500;}
.nav-item.active{color:var(--g);}
.nav-icon{font-size:20px;display:block;margin-bottom:2px;transition:transform .2s;}
.nav-item.active .nav-icon{transform:scale(1.15);}

/* ── Cards ── */
.word-card-wrap{position:relative;margin-bottom:8px;overflow:hidden;border-radius:var(--r);}
.word-card-del{position:absolute;right:0;top:0;bottom:0;width:80px;background:var(--red);display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:0 var(--r) var(--r) 0;flex-direction:column;gap:3px;transform:translateX(100%);transition:transform .0s;}
.word-card-del-lbl{font-size:12px;color:#fff;font-weight:600;}
.word-card{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);padding:14px 16px;cursor:pointer;transition:transform .25s ease;box-shadow:var(--shadow);position:relative;z-index:1;}
.word-card:active{border-color:var(--g);}
.word-card.swiped{transform:translateX(-80px);}

/* ── Tags & Badges ── */
.tag{font-size:11px;padding:2px 8px;border-radius:var(--r-full);font-weight:600;letter-spacing:.02em;}
.tag-ja{background:#EFF6FF;color:#1D4ED8;}
.tag-fr{background:#F0FDF4;color:#15803D;}
.tag-en{background:#F5F3FF;color:#6D28D9;}
.lv-badge{font-size:11px;padding:2px 8px;border-radius:var(--r-full);font-weight:600;}
.mastered-badge{font-size:11px;padding:2px 8px;border-radius:var(--r-full);background:var(--glb);color:var(--gd);font-weight:600;}

/* ── Sort bar ── */
.sort-bar{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;}
.sort-bar::-webkit-scrollbar{display:none;}
.sort-btn{padding:5px 13px;font-size:12px;border:1px solid var(--bd);border-radius:var(--r-full);background:transparent;cursor:pointer;font-family:inherit;color:var(--tx2);white-space:nowrap;flex-shrink:0;font-weight:500;transition:all .18s;}
.sort-btn.active{background:var(--n);color:#fff;border-color:var(--n);}

/* ── Buttons ── */
.btn{width:100%;padding:14px;background:var(--g);color:#fff;border:none;border-radius:var(--r);font-size:15px;cursor:pointer;font-weight:700;font-family:inherit;transition:all .18s;box-shadow:0 1px 2px rgba(34,197,94,0.3);}
.btn:active{background:var(--gd);transform:scale(0.985);}
.btn:disabled{opacity:.45;cursor:default;transform:none;}
.btn-ghost{width:100%;padding:13px;background:transparent;color:var(--g);border:1.5px solid var(--g);border-radius:var(--r);font-size:14px;cursor:pointer;font-weight:600;font-family:inherit;transition:all .18s;}
.btn-ghost:active{background:var(--gl);}
.btn-back{background:none;border:1px solid var(--bd);border-radius:var(--r-sm);font-size:14px;color:var(--tx);cursor:pointer;padding:7px 13px;margin-bottom:18px;font-family:inherit;display:inline-flex;align-items:center;gap:5px;font-weight:500;transition:all .18s;}
.btn-back:active{background:var(--bg2);}
.add-btn{width:100%;padding:14px;border:1.5px dashed var(--bd2);border-radius:var(--r);background:transparent;font-size:14px;color:var(--tx2);cursor:pointer;margin-bottom:12px;font-family:inherit;transition:all .18s;font-weight:500;}
.add-btn:active{border-color:var(--g);color:var(--g);}

/* ── Inputs ── */
.inp{width:100%;padding:12px 14px;border:1.5px solid var(--bd);border-radius:var(--r-sm);font-size:16px;outline:none;font-family:inherit;background:var(--bg);color:var(--tx);transition:border-color .18s;}
.inp:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(34,197,94,0.12);}
.textarea{width:100%;padding:14px;border:1.5px solid var(--bd);border-radius:var(--r-sm);font-size:15px;outline:none;font-family:inherit;background:var(--bg);color:var(--tx);resize:vertical;min-height:130px;line-height:1.7;transition:border-color .18s;}
.textarea:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(34,197,94,0.12);}

/* ── Speak button ── */
.spk-btn{background:none;border:1px solid var(--bd);border-radius:var(--r-full);padding:5px 11px;font-size:12px;cursor:pointer;color:var(--g);font-family:inherit;display:inline-flex;align-items:center;gap:4px;font-weight:500;transition:all .18s;}
.spk-btn:active{background:var(--gl);border-color:var(--g);}

/* ── Section labels ── */
.sec-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--tx3);margin:20px 0 10px;text-transform:uppercase;}

/* ── Info blocks ── */
.info-blk{background:var(--bg2);border-radius:var(--r-sm);padding:12px 14px;font-size:14px;color:var(--tx2);margin-bottom:8px;line-height:1.7;border:1px solid var(--bd);}
.ex-blk{background:var(--bg2);border-radius:var(--r-sm);padding:13px 14px;margin-bottom:8px;border:1px solid var(--bd);}

/* ── Conjugation ── */
.conj-sec{background:var(--bg2);border-radius:var(--r-sm);padding:12px 14px;margin-bottom:8px;border:1px solid var(--bd);}
.tense-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;}
.tense-tab{padding:5px 12px;font-size:12px;border:1px solid var(--bd);border-radius:var(--r-full);cursor:pointer;background:transparent;font-family:inherit;color:var(--tx2);font-weight:500;transition:all .18s;}
.tense-tab.active{background:var(--n);color:#fff;border-color:var(--n);}
.conj-table{width:100%;border-collapse:collapse;font-size:13px;}
.conj-table th{text-align:left;color:var(--tx3);font-weight:400;padding:6px 8px 6px 0;font-size:12px;width:36%;}
.conj-table td{color:var(--tx);padding:6px 0;border-bottom:1px solid var(--bd);}
.conj-table tr:last-child td{border-bottom:none;}
.ipa{font-size:11px;color:var(--tx3);margin-left:5px;font-style:italic;}

/* ── Gender badge ── */
.g-m{background:#EFF6FF;color:#1D4ED8;font-size:11px;padding:2px 8px;border-radius:var(--r-full);font-weight:600;}
.g-f{background:#FFF1F2;color:#BE123C;font-size:11px;padding:2px 8px;border-radius:var(--r-full);font-weight:600;}
.g-irr{background:var(--amberb);color:var(--amber);font-size:11px;padding:2px 8px;border-radius:var(--r-full);font-weight:600;border:1px solid rgba(245,158,11,0.3);}

/* ── Flash cards ── */
.flash-card{border:1px solid var(--bd);border-radius:18px;padding:36px 24px;text-align:center;cursor:pointer;min-height:230px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:16px;transition:all .2s;box-shadow:var(--shadow);}
.flash-card:active{transform:scale(0.985);box-shadow:none;}
.flash-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn-wrong{padding:14px;background:var(--redb);color:var(--red);border:1px solid rgba(239,68,68,0.2);border-radius:var(--r);font-size:14px;cursor:pointer;font-weight:700;font-family:inherit;transition:all .18s;}
.btn-correct{padding:14px;background:var(--glb);color:var(--gd);border:1px solid rgba(34,197,94,0.2);border-radius:var(--r);font-size:14px;cursor:pointer;font-weight:700;font-family:inherit;transition:all .18s;}
.btn-wrong:active,.btn-correct:active{transform:scale(0.98);}

/* ── Progress ── */
.prog-bar{height:4px;background:var(--bg3);border-radius:var(--r-full);margin-bottom:20px;overflow:hidden;}
.prog-fill{height:100%;background:var(--g);border-radius:var(--r-full);transition:width .5s ease;}

/* ── Quiz ── */
.quiz-opt{width:100%;padding:13px 14px;border:1.5px solid var(--bd);border-radius:var(--r);font-size:14px;cursor:pointer;background:transparent;text-align:left;color:var(--tx);font-family:inherit;margin-bottom:8px;transition:all .18s;font-weight:500;}
.quiz-opt:hover:not(:disabled){border-color:var(--tx3);}
.quiz-opt.correct{background:var(--glb);border-color:var(--g);color:var(--gd);}
.quiz-opt.wrong{background:var(--redb);border-color:var(--red);color:var(--red);}
.quiz-opt:disabled{cursor:default;}
.quiz-fb{text-align:center;padding:10px;font-size:14px;font-weight:700;border-radius:var(--r-sm);margin-bottom:10px;}
.quiz-fb.correct{background:var(--glb);color:var(--gd);}
.quiz-fb.wrong{background:var(--redb);color:var(--red);}

/* ── Mode tabs ── */
.mode-tabs{display:flex;background:var(--bg2);border-radius:var(--r-sm);padding:3px;gap:2px;margin-bottom:18px;border:1px solid var(--bd);}
.mode-tab{flex:1;padding:9px 6px;border:none;border-radius:9px;font-size:13px;cursor:pointer;background:transparent;color:var(--tx2);font-family:inherit;text-align:center;white-space:nowrap;font-weight:500;transition:all .18s;}
.mode-tab.active{background:var(--bg);color:var(--tx);box-shadow:var(--shadow);font-weight:600;}

/* ── Writing ── */
.w-topic{background:var(--gl);border-radius:var(--r);padding:16px;margin-bottom:14px;border:1px solid var(--glb);}
.c-ok{background:var(--glb);border:1px solid rgba(34,197,94,0.25);border-radius:var(--r-sm);padding:14px;margin-bottom:10px;}
.c-fix{background:var(--amberb);border:1px solid rgba(245,158,11,0.25);border-radius:var(--r-sm);padding:14px;margin-bottom:10px;}
.c-lbl{font-size:10px;font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em;}
.c-ok .c-lbl{color:var(--gd);}
.c-fix .c-lbl{color:var(--amber);}
.score-badge{display:inline-flex;align-items:center;gap:6px;background:var(--glb);border-radius:var(--r-full);padding:7px 16px;font-size:13px;color:var(--gd);font-weight:700;margin-bottom:16px;border:1px solid rgba(34,197,94,0.2);}
.kw-chip{padding:5px 12px;background:var(--bg);border:1px solid var(--bd);border-radius:var(--r-full);font-size:13px;color:var(--tx2);cursor:pointer;display:inline-block;margin:0 4px 5px 0;transition:all .18s;font-weight:500;}
.kw-chip.used{background:var(--glb);border-color:rgba(34,197,94,0.4);color:var(--gd);}
.spk-lg{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:var(--n);color:#fff;border:none;border-radius:var(--r-full);font-size:13px;cursor:pointer;font-family:inherit;font-weight:600;transition:all .18s;}
.spk-lg:active{background:var(--nb);}

/* ── Stats ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.stat-card{background:var(--bg2);border-radius:var(--r);padding:16px;border:1px solid var(--bd);}
.stat-lbl{font-size:12px;color:var(--tx2);margin-bottom:4px;font-weight:500;}
.stat-val{font-size:28px;font-weight:800;color:var(--tx);letter-spacing:-.02em;}
.week-dots{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;}
.day-dot{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
.day-done{background:var(--glb);color:var(--gd);}
.day-todo{background:var(--bg2);color:var(--tx3);}
.ebi-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:8px;}
.ebi-day{border-radius:8px;padding:5px 3px;text-align:center;font-size:11px;min-height:46px;}
.ebi-none{background:var(--bg2);color:var(--tx3);}
.ebi-light{background:var(--glb);color:var(--gd);}
.ebi-med{background:#DBEAFE;color:#1D4ED8;}
.ebi-heavy{background:var(--amberb);color:var(--amber);}
.ebi-today{background:var(--g);color:#fff;font-weight:700;}

/* ── Import ── */
.import-row{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:var(--r-sm);margin-bottom:4px;font-size:13px;}
.import-row.pending{background:var(--bg2);}
.import-row.active{background:#DBEAFE;animation:pulse 1s infinite;}
.import-row.done{background:var(--glb);}
.import-row.err{background:var(--redb);}
.import-row.skip{background:var(--bg2);opacity:.5;}

/* ── Lang setup ── */
.lang-card{border:2px solid var(--bd);border-radius:var(--r);padding:18px 20px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:all .2s;}
.lang-card:active{transform:scale(0.985);}
.lang-card.active{border-color:var(--g);background:var(--gl);}
.toggle-switch{width:46px;height:27px;border-radius:var(--r-full);background:var(--bg3);position:relative;transition:background .22s;flex-shrink:0;border:1px solid var(--bd);}
.toggle-switch.on{background:var(--g);border-color:var(--g);}
.toggle-switch::after{content:'';position:absolute;width:21px;height:21px;border-radius:50%;background:#fff;top:2px;left:2px;transition:transform .22s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.toggle-switch.on::after{transform:translateX(19px);}

/* ── Dict result ── */
.dict-result{border:2px solid var(--g);border-radius:var(--r);padding:16px;margin-top:14px;background:var(--gl);}
.sense-item{padding:7px 0;border-bottom:1px solid var(--glb);font-size:13px;color:var(--tx);line-height:1.5;}
.sense-item:last-child{border-bottom:none;}

/* ── Colloc chips ── */
.colloc-chip{display:inline-flex;align-items:center;gap:5px;background:var(--bg);border:1px solid var(--bd);border-radius:var(--r-full);padding:6px 12px;font-size:13px;margin:0 5px 6px 0;color:var(--tx);font-weight:500;}

/* ── Word family ── */
.fam-card{border:1px solid var(--bd);border-radius:var(--r-sm);padding:11px 14px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;background:var(--bg2);}
.fam-pos{font-size:11px;padding:2px 8px;border-radius:var(--r-full);background:var(--bg3);color:var(--tx2);font-weight:500;}

/* ── Misc ── */
.err-msg{font-size:13px;margin-bottom:10px;padding:10px 13px;background:var(--redb);color:var(--red);border-radius:var(--r-sm);border:1px solid rgba(239,68,68,0.2);}
.empty-state{text-align:center;padding:52px 16px;color:var(--tx2);font-size:14px;line-height:1.9;}
.loading-pulse{animation:pulse 1.2s infinite;}

/* ── Fullscreen writing ── */
.wf-screen{position:fixed;inset:0;background:var(--bg);z-index:50;display:flex;flex-direction:column;}
.wf-header{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;padding-top:max(13px,env(safe-area-inset-top));border-bottom:1px solid var(--bd);flex-shrink:0;}
.wf-body{flex:1;display:flex;flex-direction:column;padding:12px 16px;gap:8px;overflow:hidden;}
.wf-textarea{flex:1;width:100%;padding:14px;border:1.5px solid var(--bd);border-radius:var(--r-sm);font-size:16px;outline:none;font-family:inherit;background:var(--bg);color:var(--tx);resize:none;line-height:1.7;transition:border-color .18s;}
.wf-textarea:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(34,197,94,0.12);}
.wf-footer{padding:10px 16px;padding-bottom:max(16px,calc(env(safe-area-inset-bottom) + 8px));border-top:1px solid var(--bd);flex-shrink:0;}

/* ── Ai enrich banner ── */
.enrich-banner{background:var(--amberb);border:1px solid rgba(245,158,11,0.3);border-radius:var(--r-sm);padding:11px 14px;margin-top:14px;display:flex;align-items:center;justify-content:space-between;gap:8px;}

/* ── Animations ── */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-100px) scale(1.5)}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.celebrate{position:fixed;pointer-events:none;font-size:36px;animation:floatUp 1.3s ease-out forwards;z-index:999;transform:translate(-50%,-50%);}
.slide-up{animation:slideUp .25s ease-out;}

/* ── Scrollbar ── */
.screen::-webkit-scrollbar{width:3px;}
.screen::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px;}

function migrateData(){
  // 旧バージョンのauth keyから移行
  const oldAuthKeys=['lingua-auth-v3','lingua-auth-v2','lingua-auth'];
  for(const oldKey of oldAuthKeys){
    const r=ls(oldKey);
    if(!r)continue;
    try{
      const oldU=JSON.parse(r);
      if(!oldU.email||!oldU.sk)continue;
      // 現在のkeyにデータがなければ移行
      const newAuthExists=ls('lingua-auth-v4');
      if(!newAuthExists){
        lsSet('lingua-auth-v4',r);
        // words migrate
        const oldWords=ls('lingua-words-'+oldU.sk);
        if(oldWords&&!ls('lingua-words-'+oldU.sk))lsSet('lingua-words-'+oldU.sk,oldWords);
        // essays migrate
        const oldEssays=ls('lingua-essays-'+oldU.sk);
        if(oldEssays&&!ls('lingua-essays-'+oldU.sk))lsSet('lingua-essays-'+oldU.sk,oldEssays);
        // settings migrate
        const oldSettings=ls('lingua-settings-'+oldU.sk);
        if(oldSettings&&!ls('lingua-settings-'+oldU.sk))lsSet('lingua-settings-'+oldU.sk,oldSettings);
        // setup flag migrate
        const oldSetup=ls('lingua-setup-done-'+oldU.sk)||ls('lingua-setup-'+oldU.sk);
        if(oldSetup)lsSet('lingua-setup-'+oldU.sk,'1');
        console.log('Migrated from',oldKey);
      }
    }catch{}
  }
}

// AI翻译英文定义为中文（超省token）
async function translateToZh(senses,lang){
  // 只取前3条定义翻译
  const toTranslate=senses.slice(0,3).map(s=>s.text).join('|');
  const langHint={ja:'日语',fr:'法语',en:'英语'}[lang]||'英语';
  try{
    const t=await callApi(`将以下${langHint}单词定义翻译成简洁中文，用"|"分隔对应输出，不要解释：${toTranslate}`,120);
    const parts=t.trim().split('|');
    return senses.map((s,i)=>({...s,textZh:parts[i]?.trim()||'',textEn:s.text}));
  }catch{
    return senses.map(s=>({...s,textZh:'',textEn:s.text}));
  }
}

async function lookupJa(word){
  const r=await fetch('/api/jisho?keyword='+encodeURIComponent(word));
  if(!r.ok)throw new Error('辞書エラー');
  const d=await r.json();
  if(!d.data?.length)throw new Error('見つかりませんでした');
  const entry=d.data[0];
  const jp=entry.japanese[0]||{};
  const senses=entry.senses||[];
  const jlpt=entry.jlpt?.length?entry.jlpt[0].replace('jlpt-','').toUpperCase():null;
  // 英語定義を取得
  const rawSenses=senses.slice(0,6).map((s,i)=>({
    num:i+1,
    pos:s.parts_of_speech.slice(0,2).join(', '),
    text:s.english_definitions.slice(0,4).join(', ')
  }));
  // AI翻訳で中国語化
  const allSenses=await translateToZh(rawSenses,'ja');
  const meaning=allSenses[0]?.textZh||allSenses[0]?.text||'';
  return{word:jp.word||word,reading:jp.reading||'',meanings:meaning,allSenses,jlpt,delf:null,source:'Jisho+AI翻訳'};
}

async function lookupFr(word){
  let rawSenses=[];
  let reading='';
  let source='';
  // 1. zh.wiktionary（中文定義があればそのまま使う）
  try{
    const r=await fetch('https://zh.wiktionary.org/api/rest_v1/page/definition/'+encodeURIComponent(word));
    if(r.ok){
      const d=await r.json();
      const frDefs=d.fr||[];
      if(frDefs.length){
        const senses=[];
        frDefs.forEach(def=>{
          const pos=def.partOfSpeech||'';
          (def.definitions||[]).forEach(di=>{
            const text=(di.definition||'').replace(/<[^>]*>/g,'').trim();
            if(text)senses.push({num:senses.length+1,pos,text,textZh:text,textEn:''});
          });
        });
        if(senses.length){
          // 中文Wiktionaryの定義はすでに中国語なので翻訳不要
          const meanings=senses[0].text;
          return{word,reading:'',meanings,allSenses:senses.slice(0,8),jlpt:null,delf:guessDelf(word),source:'中文Wiktionary'};
        }
      }
    }
  }catch{}
  // 2. en.wiktionary fr section → AI翻訳
  try{
    const r=await fetch('https://en.wiktionary.org/api/rest_v1/page/definition/'+encodeURIComponent(word));
    if(r.ok){
      const d=await r.json();
      const frDefs=d.fr||[];
      if(frDefs.length){
        rawSenses=frDefs.slice(0,6).map((def,i)=>({
          num:i+1,pos:def.partOfSpeech||'',
          text:(def.definitions||[]).map(d=>(d.definition||'').replace(/<[^>]*>/g,'')).filter(Boolean).join('; ')
        })).filter(s=>s.text);
        source='Wiktionary+AI翻訳';
      }
    }
  }catch{}
  if(!rawSenses.length)throw new Error('「'+word+'」が見つかりません。スペルを確認してください。');
  const allSenses=await translateToZh(rawSenses,'fr');
  const meanings=allSenses[0]?.textZh||allSenses[0]?.text||'';
  return{word,reading:'',meanings,allSenses,jlpt:null,delf:guessDelf(word),source};
}

async function lookupEn(word){
  const r=await fetch('https://api.dictionaryapi.dev/api/v2/entries/en/'+encodeURIComponent(word));
  if(!r.ok)throw new Error('見つかりません');
  const d=await r.json();
  if(!Array.isArray(d)||!d.length)throw new Error('見つかりません');
  const entry=d[0];
  const phonetic=entry.phonetic||entry.phonetics?.find(p=>p.text)?.text||'';
  const rawSenses=[];
  (entry.meanings||[]).forEach(m=>(m.definitions||[]).slice(0,3).forEach(def=>rawSenses.push({pos:m.partOfSpeech,text:def.definition,example:def.example||''})));
  const allSenses=await translateToZh(rawSenses.slice(0,6),'en');
  const meanings=allSenses[0]?.textZh||allSenses[0]?.text||'';
  return{word:entry.word||word,reading:phonetic,meanings,allSenses,jlpt:null,delf:null,source:'FreeDictionary+AI翻訳'};
}

function guessDelf(w){
  const common=['être','avoir','aller','faire','dire','voir','vouloir','pouvoir','savoir','venir','prendre','partir','mettre','aimer','manger','boire','maison','famille','ami','école','travail','ville','pays','jour','temps'];
  if(common.includes(w.toLowerCase()))return'A1';
  return w.length<=6?'A2':w.length<=9?'B1':'B2';
}

// ── Prompt builder (token-minimal) ──
const FR_CONJ='{"present":[{"p":"je","f":"","i":""},{"p":"tu","f":"","i":""},{"p":"il/elle","f":"","i":""},{"p":"nous","f":"","i":""},{"p":"vous","f":"","i":""},{"p":"ils/elles","f":"","i":""}],"passe":[{"p":"jai","f":""},{"p":"tu as","f":""},{"p":"il a","f":""},{"p":"nous avons","f":""},{"p":"vous avez","f":""},{"p":"ils ont","f":""}],"imparfait":[{"p":"je","f":""},{"p":"tu","f":""},{"p":"il/elle","f":""},{"p":"nous","f":""},{"p":"vous","f":""},{"p":"ils/elles","f":""}],"futur":[{"p":"je","f":""},{"p":"tu","f":""},{"p":"il/elle","f":""},{"p":"nous","f":""},{"p":"vous","f":""},{"p":"ils/elles","f":""}]}';
const JA_CONJ='{"基":[{"l":"辞書形","f":"","r":""},{"l":"ます形","f":"","r":""},{"l":"て形","f":"","r":""},{"l":"た形","f":"","r":""}],"否":[{"l":"ない形","f":"","r":""},{"l":"ません","f":"","r":""}],"他":[{"l":"可能形","f":"","r":""},{"l":"意向形","f":"","r":""},{"l":"条件形","f":"","r":""}]}';

function isVerb(pos){
  const p=(pos||'').toLowerCase();
  return p.includes('verb')||p.includes('動詞')||p.includes('verbe')||
    p.includes('godan')||p.includes('ichidan')||p.includes('suru')||
    p.includes('くる')||p.includes('する')||p.includes('transitive')||p.includes('intransitive');
}
function isNoun(pos){
  const p=(pos||'').toLowerCase();
  return p.includes('noun')||p.includes('名詞')||p.includes('nom')||
    p.includes('pronoun')||p.includes('prefix')||p.includes('suffix');
}
function isAdj(pos){
  const p=(pos||'').toLowerCase();
  return p.includes('adjective')||p.includes('形容詞')||p.includes('adjectif')||p.includes('i-adj')||p.includes('na-adj');
}

function buildPrompt(word,meaning,lang,pos){
  const vb=isVerb(pos),nn=isNoun(pos);
  const ex2='[{"text":"","trans":"中文"},{"text":"","trans":"中文"}]';
  const wf2='[{"word":"","pos":"","meaning":""},{"word":"","pos":"","meaning":""}]';
  const col3='[{"phrase":"","meaning":"中文"},{"phrase":"","meaning":"中文"},{"phrase":"","meaning":"中文"}]';
  if(lang==='fr'){
    const gp=nn?',"gender":{"masc":"","fem":null,"mascPl":"","irregular":false}':',"gender":null';
    const cp=vb?',"conjugations":'+FR_CONJ:',"conjugations":null';
    return `FR「${word}」(${meaning})。JSON only:{"reading":"/IPA/"${gp},"pluralNote":null,"examples":${ex2},"grammar":"中文语法要点","related":"相关词","wordFamily":${wf2}${cp},"collocations":${col3}}`;
  }
  if(lang==='ja'){
    // 動詞のみ活用表を生成、名詞・形容詞はnull
    const adj=isAdj(pos);
    const JA_ADJ_CONJ='{"基":[{"l":"辞書形","f":"","r":""},{"l":"です形","f":"","r":""},{"l":"て形","f":"","r":""},{"l":"た形","f":"","r":""}],"否":[{"l":"ない形","f":"","r":""},{"l":"ではない","f":"","r":""}]}';
    const cp=vb?',"conjugations":'+JA_CONJ:adj?',"conjugations":'+JA_ADJ_CONJ:',"conjugations":null';
    return `日「${word}」(${meaning})。JSON only:{"reading":"假名(roma)","examples":${ex2},"grammar":"中文语法要点","related":"相关词","wordFamily":${wf2}${cp},"collocations":${col3}}`;
  }
  return `EN「${word}」(${meaning})。JSON only:{"reading":"/IPA/","examples":${ex2},"grammar":"中文语法要点","related":"related words","wordFamily":${wf2},"conjugations":null,"collocations":${col3}}`;
}

// ── Speech synthesis ──
// ── 声音选择优先级 ──
// 日语优先级：Google日本語 > お-ren(iOS) > Kyoko(macOS) > Otoya > 其他ja-JP在线 > 离线
// iOS上 "O-ren" 或 "Kyoko" 通常质量较好
// 参数 preferFemale 可控制男/女声优先
const VOICE_PREFS={
  fr:['Google français','Thomas','Amelie','Marie','fr-FR'],
  ja:['Google 日本語','O-ren','Kyoko','Otoya','Hattori','ja-JP'],
  en:['Google US English','Samantha','Karen','Daniel','Moira','en-US']
};
// 已知质量较差的声音（跳过）
const VOICE_BLACKLIST=['Microsoft','eline','Alice'];
let _vc={};

function getBestVoice(lang){
  const voices=speechSynthesis.getVoices();
  if(!voices.length)return null;
  const bcp=LANG[lang]?.bcp||'en-US';
  const langCode=bcp.slice(0,2); // 'ja','fr','en'

  // 步骤1：按优先级名单匹配
  const prefs=VOICE_PREFS[lang]||[];
  for(const p of prefs){
    const v=voices.find(x=>
      x.name.includes(p)&&
      !VOICE_BLACKLIST.some(b=>x.name.includes(b))
    );
    if(v){_vc[lang]=v;return v;}
  }

  // 步骤2：同语言的在线声音优先（在线音质更好）
  const byLang=voices.filter(x=>
    (x.lang===bcp||x.lang.startsWith(langCode))&&
    !VOICE_BLACKLIST.some(b=>x.name.includes(b))
  );
  const online=byLang.find(x=>!x.localService);
  if(online){_vc[lang]=online;return online;}

  // 步骤3：同语言离线声音
  if(byLang[0]){_vc[lang]=byLang[0];return byLang[0];}

  return null;
}

function speak(text,lang){
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang=LANG[lang]?.bcp||'en-US';
  // 日语：少し遅め、ピッチ自然に
  u.rate=lang==='ja'?0.78:lang==='fr'?0.84:0.88;
  u.pitch=lang==='ja'?1.0:1.0;
  u.volume=1.0;
  const go=()=>{
    const v=getBestVoice(lang);
    if(v){u.voice=v;u.lang=v.lang;}// 声音的lang比BCP更准确
    speechSynthesis.speak(u);
  };
  if(speechSynthesis.getVoices().length>0)go();
  else speechSynthesis.onvoiceschanged=()=>{speechSynthesis.onvoiceschanged=null;go();};
}

function genderH(g){
  if(!g)return'';
  let h='';
  if(g.masc)h+=`<span class="g-m">m.${g.masc}</span>`;
  if(g.fem)h+=`<span class="g-f">f.${g.fem}</span>`;
  if(g.irregular)h+=`<span class="g-irr">不規則</span>`;
  return h;
}

async function doLookup(){
  const inp=document.getElementById('addInput');
  const word=(inp?.value||S.addInput).trim();
  if(!word)return;
  S.addInput=word;S.addLoading=true;S.addResult=null;S.addErr='';render();
  try{
    S.addResult=S.lang==='ja'?await lookupJa(word):S.lang==='fr'?await lookupFr(word):await lookupEn(word);
  }catch(e){S.addErr=e.message||'見つかりませんでした';}
  S.addLoading=false;render();
  // Restore input focus & value
  setTimeout(()=>{const i=document.getElementById('addInput');if(i){i.value=word;i.focus();}},30);
}

async function confirmAdd(){
  const r=S.addResult;if(!r)return;
  const memo=document.getElementById('addMemo')?.value.trim()||S.addMemo||'';
  const meaning=memo||r.allSenses?.[0]?.text||r.meanings||'';
  const pos=r.allSenses?.[0]?.pos||'';
  // Save immediately
  const nw={id:Date.now().toString(),word:r.word,lang:S.lang,
    data:{word:r.word,reading:r.reading||'',meaning,
      delf:S.lang==='fr'?r.delf||null:null,jlpt:S.lang==='ja'?r.jlpt||null:null,
      gender:null,pluralNote:null,examples:[],grammar:'',related:'',
      wordFamily:[],conjugations:null,collocations:[],
      source:r.source,allSenses:r.allSenses||[],aiEnriched:false},
    reviewCount:0,mastered:false,addedAt:Date.now()};
  S.words=[nw,...S.words];saveWords();
  S.addAiLoading=true;render();
  // AI enrichment
  try{
    const txt=await callApi(buildPrompt(r.word,meaning,S.lang,pos),1000);
    const ai=JSON.parse(txt.replace(/```json|```/g,'').trim());
    const idx=S.words.findIndex(w=>w.id===nw.id);
    if(idx>=0){
      const d=S.words[idx].data;
      if(ai.reading&&!d.reading)d.reading=ai.reading;
      if(ai.gender)d.gender=ai.gender;
      if(ai.pluralNote)d.pluralNote=ai.pluralNote;
      if(ai.examples?.length)d.examples=ai.examples;
      if(ai.grammar)d.grammar=ai.grammar;
      if(ai.related)d.related=ai.related;
      if(ai.wordFamily?.length)d.wordFamily=ai.wordFamily;
      if(ai.conjugations)d.conjugations=ai.conjugations;
      if(ai.collocations?.length)d.collocations=ai.collocations;
      d.aiEnriched=true;
      saveWords();
    }
  }catch(e){console.warn('AI enrichment failed:',e.message);}
  S.addAiLoading=false;S.addInput='';S.addResult=null;S.addErr='';S.addMemo='';
  celebrate();setView('list');
}

// ── Swipe to delete ──
let _swipeStartX=0,_swipeStartY=0,_swipedId=null;
function swipeStart(e,id){
  _swipeStartX=e.touches[0].clientX;
  _swipeStartY=e.touches[0].clientY;
}
function swipeEnd(e,id){
  const dx=e.changedTouches[0].clientX-_swipeStartX;
  const dy=Math.abs(e.changedTouches[0].clientY-_swipeStartY);
  if(dy>30)return; // vertical scroll - ignore
  if(dx<-50){
    // swipe left → reveal delete
    if(_swipedId&&_swipedId!==id)collapseCard(_swipedId);
    _swipedId=id;
    const card=document.getElementById('card-'+id);
    const del=document.getElementById('del-'+id);
    if(card){card.classList.add('swiped');}
    if(del){del.style.transform='translateX(0)';}
  }else if(dx>20){
    collapseCard(id);
  }
}
function collapseCard(id){
  const card=document.getElementById('card-'+id);
  const del=document.getElementById('del-'+id);
  if(card)card.classList.remove('swiped');
  if(del)del.style.transform='translateX(100%)';
  if(_swipedId===id)_swipedId=null;
}
function handleCardClick(id){
  if(_swipedId===id){collapseCard(id);return;}
  selWord(id);
}
function confirmDeleteWord(id){
  collapseCard(id);
  if(!confirm('この単語を削除しますか？'))return;
  S.words=S.words.filter(w=>w.id!==id);
  saveWords();render();
}

function deleteWord(id){
  if(!confirm('この単語を削除しますか？'))return;
  S.words=S.words.filter(w=>w.id!==id);
  saveWords();setView('list');
}

function conjH(c,lang){
  if(!c)return'';
  const jaLabels={基本形:'基本形',否定形:'否定形',応用形:'応用形',基:'基本形',否:'否定形',他:'応用形'};

  }
  // French
  const nm={present:'現在形',passe:'複合過去',imparfait:'半過去',futur:'単純未来'};
  const ts=Object.keys(c);if(!ts.length)return'';

async function enrichWord(id){
  const w=S.words.find(x=>x.id===id);if(!w)return;
  const d=w.data;
  const btn=document.querySelector('.enrich-banner button');
  if(btn){btn.textContent='生成中...';btn.disabled=true;}
  try{
    const txt=await callApi(buildPrompt(d.word,d.meaning,w.lang,d.allSenses?.[0]?.pos||''),1000);
    const ai=JSON.parse(txt.replace(/```json|```/g,'').trim());
    if(ai.reading&&!d.reading)d.reading=ai.reading;
    if(ai.gender)d.gender=ai.gender;
    if(ai.examples?.length)d.examples=ai.examples;
    if(ai.grammar)d.grammar=ai.grammar;
    if(ai.related)d.related=ai.related;
    if(ai.wordFamily?.length)d.wordFamily=ai.wordFamily;
    if(ai.conjugations)d.conjugations=ai.conjugations;
    if(ai.collocations?.length)d.collocations=ai.collocations;
    d.aiEnriched=true;
    saveWords();render();
  }catch(e){alert('生成に失敗しました: '+e.message);}
}

async function doSentenceCheck(wordId,word,lang){
  const txt=document.getElementById('sentInput')?.value||S.fSentenceInput;
  if(!txt.trim()){S.fSentenceErr='文を入力してください';render();return;}
  if(sentenceCountToday(wordId)>=3){S.fSentenceErr='今日はすでに3回練習しました。明日また来てね！';render();return;}
  S.fSentenceLoading=true;S.fSentenceErr='';render();
  const langName={fr:'法语',ja:'日语',en:'英语'}[lang]||'英语';
  // 动词变形说明，告诉AI接受变形
  const verbNote=lang==='fr'?'注意：动词可以变位（如原形partir → je pars/il est parti等），变位正确应视为正确用法。':
    lang==='ja'?'注意：动词可以活用（如食べる→食べた/食べます等），活用正确应视为正确用法。':
    'Note: verb conjugations are acceptable (e.g. run→ran/running).';
  try{
    const t=await callApi('你是'+langName+'老师。学生用「'+word+'」（或其变形/活用）造了句：'+txt.trim()+'\n\n'+verbNote+'\n请批改。JSON only:{"score":1-10,"corrected":"修正后的句子","note":"简短建议中文1-2句"}',350);
    S.fSentenceResult=JSON.parse(t.replace(/```json|```/g,'').trim());
    incrementSentenceCount(wordId);
  }catch(e){S.fSentenceErr='添削に失敗しました（'+e.message+'）';}
  S.fSentenceLoading=false;render();
}


function quizH(mode='quiz_meaning'){
  const v=S.words.filter(w=>w.lang===S.lang);
  if(!v.length)return`<div class="empty-state"><div style="font-size:40px;margin-bottom:12px">📝</div><div style="font-weight:600;color:var(--tx)">単語を追加してください</div></div>`;

  // mode: quiz_meaning=単語→意味, quiz_word=意味→単語, quiz_reading=読み→単語
  const qs=v.map(w=>{
    const distractors=getDistractors(w,S.lang,3);
    let question,questionSub,opts;
    if(mode==='quiz_word'){
      question=w.data.meaning;
      questionSub='';
      opts=[{text:w.data.word,wid:w.id,correct:true},...distractors.map(d=>({text:d.word,wid:d.id,correct:false}))].sort(()=>Math.random()-.5);
    }else if(mode==='quiz_reading'&&w.data.reading){
      question='__AUDIO__';
      questionSub=w.data.meaning;
      opts=[{text:w.data.word,wid:w.id,correct:true},...distractors.map(d=>({text:d.word,wid:d.id,correct:false}))].sort(()=>Math.random()-.5);
    }else{
      question=w.data.word;
      questionSub=w.data.reading||'';
      opts=[{text:w.data.meaning,wid:w.id,correct:true},...distractors.map(d=>({text:d.meaning,wid:d.id,correct:false}))].sort(()=>Math.random()-.5);
    }
    return{...w,question,questionSub,opts};
  });

  if(!qs.length)return`<div class="empty-state">この問題形式に対応した単語がありません</div>`;
  const q=qs[S.qIdx%qs.length];

  const modeLabel={
    quiz_meaning:'単語 → 意味',
    quiz_word:'意味 → 単語',
    quiz_reading:'読み → 単語'
  }[mode]||'';

  return`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <span style="font-size:13px;color:var(--tx2);font-weight:500">正解 ${S.qScore.c}/${S.qScore.t}</span>
      <span style="font-size:11px;padding:2px 8px;background:var(--bg2);border:1px solid var(--bd);border-radius:20px;color:var(--tx3)">${modeLabel}</span>
    </div>
    <div class="prog-bar"><div class="prog-fill" style="width:${Math.round(S.qScore.t/(qs.length||1)*100)}%"></div></div>
    <div style="background:var(--bg2);border:1.5px solid var(--bd);border-radius:16px;padding:20px;margin-bottom:14px">
      <div style="font-size:11px;color:var(--tx3);margin-bottom:10px;font-weight:500;letter-spacing:.05em;text-transform:uppercase">
        ${{quiz_meaning:'どういう意味？',quiz_word:'どの単語？',quiz_reading:'発音を聞いて単語を選ぶ'}[mode]||''}
      </div>
      ${q.question==='__AUDIO__'?`
        <div style="margin-bottom:12px">
          <button onclick="speak('${q.data.word.replace(/'/g,"\'")}','${q.lang}')"
            style="display:flex;align-items:center;gap:10px;padding:14px 24px;background:var(--n);color:#fff;border:none;border-radius:var(--r-full);font-size:16px;cursor:pointer;font-family:inherit;font-weight:600;margin:0 auto">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
            発音を聞く
          </button>
          ${q.questionSub?`<div style="font-size:13px;color:var(--tx3);text-align:center;margin-top:8px">ヒント：${q.questionSub}</div>`:''}
        </div>
      `:`
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px">

    ${S.qFb?`<div class="quiz-fb ${S.qFb}">${S.qFb==='correct'?'✓ 正解！':'✗ 不正解'}</div>`:''}
    ${S.qFb?`<div style="background:${S.qFb==='correct'?'var(--glb)':'var(--redb)'};border-radius:14px;padding:14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:10px">
      <div>

function goToWordDetail(wordId){
  if(!wordId)return;
  const w=S.words.find(x=>x.id===wordId);
  if(!w)return;
  S.sel=w;S.tab='words';S.view='detail';S.tense='present';
  render();
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.tab==='words'));
}

function quizAns(ok,i,optText){
  if(S.qAns!==null)return;
  S.qAns=i;S.qScore={c:S.qScore.c+ok,t:S.qScore.t+1};S.qFb=ok?'correct':'wrong';
  S.qLastCorrect=ok?'':(optText||'');
  render();
}
function quizNext(){
  S.qIdx++;S.qAns=null;S.qFb=null;S.qLastCorrect='';render();
}
function flashAns(ok){
  S.fSess[S.fIdx]._ok=ok;
  if(ok){const w=S.words.find(x=>x.id===S.fSess[S.fIdx].id);if(w){w.reviewCount++;if(w.reviewCount>=5)w.mastered=true;saveWords();}}
  S.fIdx++;S.fFlip=false;if(S.fIdx>=S.fSess.length)S.fDone=true;render();
}

function insertKw(kw){

function insertKwFS(kw){

async function doWriting(){
  const txt=document.getElementById('wInput')?.value||S.wText;
  S.wText=txt;if(!txt.trim())return;
  const today=revisionCountToday();
  if(essayCountToday()>=3&&!S.wEssayId){S.wErr='📅 今日はすでに3篇書きました。明日（'+tomorrowStr()+'）また書いてみよう！';render();return;}
  if(today>=3||S.wRevCount>=3){S.wErr='✏️ 今日の添削は3回まで。よく頑張りました！明日（'+tomorrowStr()+'）また来てね 😊';render();return;}
  S.wLoad=true;S.wErr='';render();
  const topics=getTopics();
  const ti=S.wTopicIdx!==null?S.wTopicIdx:dailyTopicIdx(topics.length);
  const topic=topics[ti];
  const langName={fr:'法语',ja:'日语',en:'英语'}[S.lang]||'英语';
  try{
    const diffNote={A1:'学生水平A1初级',A2:'学生水平A2基础',B1:'学生水平B1中级',B2:'学生水平B2中高级'}[S.wDifficulty]||'';
    const t=await callApi(`你是专业${langName}教师(${diffNote})。添削作文主题「${topic.title}」：\n\n${txt.trim()}\n\nJSON only:{"score":1-10,"corrected":"修正后文章","errors":[{"type":"","original":"","fixed":"","note":""}],"praise":""}`,1000);
    S.wResult=JSON.parse(t.replace(/```json|```/g,'').trim());
    if(!S.wEssayId)S.wEssayId=Date.now().toString();
    S.wRevCount++;
    S.wHistory=[{id:Date.now().toString(),lang:S.lang,topic:topic.title,original:txt.trim(),result:S.wResult,score:S.wResult.score||null,date:Date.now(),essayId:S.wEssayId,revNum:S.wRevCount},...S.wHistory];
    saveEssays();S.wView='result';
  }catch(e){S.wErr='添削に失敗しました（'+e.message+'）';}
  S.wLoad=false;render();
}

function ebiH(){
  const sc={};
  S.words.filter(w=>w.lang===S.lang).forEach(w=>EBI.forEach(d=>{
    const dt=new Date(w.addedAt+d*86400000);dt.setHours(0,0,0,0);
    const k=dt.getTime();sc[k]=(sc[k]||0)+1;
  }));
  const today=new Date();today.setHours(0,0,0,0);
  const cells=[];
  for(let i=0;i<14;i++){
    const d=new Date(today.getTime()+i*86400000);
    const count=sc[d.getTime()]||0;
    cells.push({d,count,cls:i===0?'ebi-today':count===0?'ebi-none':count<=2?'ebi-light':count<=4?'ebi-med':'ebi-heavy'});
  }
  const total=cells.reduce((s,c)=>s+c.count,0);
  return`<div style="background:var(--bg2);border-radius:14px;padding:14px;margin-bottom:16px;border:1px solid var(--bd)">

      ${Array(new Date(today).getDay()).fill('<div></div>').join('')}
      ${cells.map(c=>`<div class="ebi-day ${c.cls}"><div>${c.d.getDate()}</div>${c.count?`<span style="font-size:12px;font-weight:700;display:block;margin-top:1px">${c.count}</span>`:''}</div>`).join('')}

}

        <div class="stat-lbl">習得率</div>
        <div class="stat-val">${masteryPct}%</div>
        <div style="font-size:12px;color:var(--tx3);margin-top:4px">${mas}語習得済み</div>
      </div>
      <div class="stat-card">
        <div class="stat-lbl">学習中</div>
        <div class="stat-val">${reviewing}</div>
        <div style="font-size:12px;color:var(--tx3);margin-top:4px">復習${reviewing}・新規${newWords}</div>
      </div>
      <div class="stat-card">
        <div class="stat-lbl">作文</div>
        <div class="stat-val">${essayCount}</div>
        <div style="font-size:12px;color:var(--tx3);margin-top:4px">${avgScore?'平均'+avgScore+'点':essays.length?'採点なし':'まだなし'}</div>
      </div>
    </div>
    <div class="sec-lbl">今週の学習</div>
    <div class="week-dots">
      ${['日','月','火','水','木','金','土'].map((d,i)=>`<div class="day-dot ${(today===0?i<=6:i<today)?'day-done':'day-todo'}">${d}</div>`).join('')}
    </div>
    ${Object.keys(lv).length?`
      <div class="sec-lbl">レベル分布</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px">
        ${Object.entries(lv).sort().map(([k,n])=>`<span class="lv-badge" style="background:${LV_BG[k]||'#eee'};color:${LV_FG[k]||'#333'}">${k}: ${n}語</span>`).join('')}
      </div>`:''}
    ${ebiH()}
    ${isAdmin(U.email)?whitelistAdminH():''}
    ${isAdmin(U.email)?`<div class="sec-lbl">発音テスト</div>`:''}
    ${isAdmin(U.email)?`<div style="background:var(--bg2);border-radius:14px;padding:14px;margin-bottom:16px;border:1px solid var(--bd)">
      <div style="font-size:13px;color:var(--tx2);margin-bottom:10px">現在の音声を確認・テストできます</div>
      ${['ja','fr','en'].filter(l=>S.enabledLangs[l]).map(l=>{
        const voices=window.speechSynthesis?.getVoices()||[];
        const bcp=LANG[l]?.bcp||'en-US';
        const v=voices.find(x=>x.lang===bcp||x.lang.startsWith(bcp.slice(0,2)));
        const vName=v?.name||'未検出';
        const samples={ja:'こんにちは、よろしくお願いします',fr:'Bonjour, comment allez-vous?',en:'Hello, how are you today?'};
        return`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bd)">
          <div>
            <span style="font-size:13px;font-weight:500;color:var(--tx)">${LANG[l].flag} ${LANG[l].label}</span>
            <div style="font-size:11px;color:var(--tx3);margin-top:2px">${vName}</div>
          </div>
          <button onclick="speak('${samples[l]}','${l}')" style="padding:6px 14px;background:var(--n);color:#fff;border:none;border-radius:20px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:600">▶ テスト</button>
        </div>`;
      }).join('')}
    </div>`:''}
    <div class="sec-lbl">言語設定</div>
    ${Object.entries(LANG).map(([code,info])=>`
      <div class="lang-card${S.enabledLangs[code]?' active':''}" onclick="toggleLang('${code}')">
        <div style="display:flex;align-items:center;gap:14px">
          <span style="font-size:30px">${info.flag}</span>
          <div>
            <div style="font-size:15px;font-weight:600;color:var(--tx)">${info.label}</div>
            <div style="font-size:12px;color:var(--tx3)">${S.words.filter(w=>w.lang===code).length}語収集済み</div>
          </div>
        </div>
        <div class="toggle-switch${S.enabledLangs[code]?' on':''}"></div>
      </div>`).join('')}`;
}

function toggleLang(code){
  const active=activeLangs();
  if(S.enabledLangs[code]&&active.length<=1){alert('最低1つの言語が必要です');return;}
  S.enabledLangs[code]=!S.enabledLangs[code];
  saveSettings();
  if(!S.enabledLangs[S.lang])S.lang=activeLangs()[0];
  showApp();
}

// ════════════════════════
// ⚙️ SETUP
// ════════════════════════
function setupH(){
  const any=Object.values(S.enabledLangs).some(v=>v);
  return`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:40px 28px;background:var(--bg)">
    <div style="margin-bottom:24px">${logoFull()}</div>
    <div style="font-size:26px;font-weight:800;color:var(--tx);margin-bottom:6px;text-align:center;letter-spacing:-.02em">Lingua</div>
    <div style="font-size:16px;font-weight:600;color:var(--tx);margin-bottom:6px;text-align:center">学習する言語を選んでください</div>
    <div style="font-size:13px;color:var(--tx2);margin-bottom:28px;text-align:center">複数選択・後から変更可能</div>
    ${Object.entries(LANG).map(([code,info])=>`
      <div class="lang-card${S.enabledLangs[code]?' active':''}" style="width:100%;max-width:320px" onclick="toggleSetupLang('${code}')">
        <div style="display:flex;align-items:center;gap:14px">
          <span style="font-size:34px">${info.flag}</span>
          <div>
            <div style="font-size:16px;font-weight:700;color:var(--tx)">${info.label}</div>
            <div style="font-size:12px;color:var(--tx3)">無料辞書 + AI詳細</div>
          </div>
        </div>
        <div class="toggle-switch${S.enabledLangs[code]?' on':''}"></div>
      </div>`).join('')}
    ${!any?`<div style="font-size:13px;color:var(--red);margin:8px 0">最低1つ選んでください</div>`:''}
    <button class="btn" style="margin-top:16px;max-width:320px;width:100%" onclick="finishSetup()" ${!any?'disabled':''}>はじめる →</button>
  </div>`;
}

function toggleSetupLang(code){
  const active=Object.entries(S.enabledLangs).filter(([,v])=>v);
  if(S.enabledLangs[code]&&active.length<=1)return;
  S.enabledLangs[code]=!S.enabledLangs[code];
  document.getElementById('root').innerHTML=setupH();
}
function finishSetup(){
  const active=activeLangs();
  if(!active.length)return;
  S.lang=active[0];saveSettings();
  lsSet(setupKey(),'1');showApp();
}

// ════════════════════════
// 🔐 AUTH
// ════════════════════════
function showLogin(){
  document.getElementById('root').innerHTML=`
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:40px 28px;background:var(--bg)">
      <div style="margin-bottom:20px">${logoFull()}</div>
      <div style="font-size:26px;font-weight:800;color:var(--tx);margin-bottom:6px;letter-spacing:-.02em">Lingua</div>
      <div style="font-size:15px;color:var(--tx2);margin-bottom:32px;text-align:center;line-height:1.7">メールアドレスで<br>あなた専用の単語帳を作ろう</div>
      <input id="lEmail" class="inp" type="email" placeholder="your@email.com" style="margin-bottom:10px;max-width:320px;width:100%">
      <div id="lErr" style="font-size:13px;color:var(--red);min-height:16px;margin-bottom:10px"></div>
      <button class="btn" style="max-width:320px" onclick="doLogin()">ログイン / 新規作成</button>
      <div style="font-size:12px;color:var(--tx3);margin-top:16px;text-align:center">パスワード不要 · このデバイスのみに保存</div>
    </div>`;
  document.getElementById('lEmail')?.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
}

function doLogin(){
  const email=(document.getElementById('lEmail')?.value||'').trim().toLowerCase();
  const err=document.getElementById('lErr');
  if(!email||!/^[^@]+@[^@]+\.[^@]+$/.test(email)){if(err)err.textContent='有効なメールを入力してください';return;}
  if(!isWhitelisted(email)){
    if(err)err.innerHTML=`このメールはまだ登録されていません。<br>管理者（<a href="mailto:${ADMIN_EMAIL}" style="color:var(--blue)">${ADMIN_EMAIL}</a>）に申請してください。`;
    return;
  }
  U={email,sk:btoa(email).replace(/[^a-zA-Z0-9]/g,'').slice(0,24)};
  saveAuth();loadAll();
  if(!ls(setupKey())){document.getElementById('root').innerHTML=setupH();return;}
  showApp();
}

function loadAuth(){
  migrateData();
  const r=ls('lingua-auth-v4');
  if(r){
    try{U=JSON.parse(r);loadAll();if(!ls(setupKey())){document.getElementById('root').innerHTML=setupH();return;}showApp();}
    catch{showLogin();}
  }else showLogin();
}

function doLogout(){lsDel('lingua-auth-v4');U={email:'',sk:''};S.words=[];S.wHistory=[];showLogin();}

// ════════════════════════
// 🏠 APP SHELL
// ════════════════════════
function showApp(){
  const langs=activeLangs();
  if(!S.enabledLangs[S.lang]&&langs.length)S.lang=langs[0];
  const initials=U.email.slice(0,2).toUpperCase();
  document.getElementById('root').innerHTML=`
    <div style="display:flex;flex-direction:column;height:100svh;max-height:100dvh">
      <div class="top-bar">
        <div>${logoSmall()}</div>
        <div class="lang-toggle">
          ${langs.map(l=>`<button class="lang-btn${S.lang===l?' active':''}" data-lang="${l}" onclick="setLang('${l}')">${LANG[l].flag} ${LANG[l].short}</button>`).join('')}
        </div>
        <div class="user-pill" style="flex:none;max-width:115px">
          <div class="user-av">${initials}</div>
          <span class="user-em">${U.email}</span>
          <button class="logout-x" onclick="doLogout()" title="ログアウト">×</button>
        </div>
      </div>
      <div class="screen" id="screen"></div>
      <nav class="navbar">
        <div class="nav-item active" data-tab="words" onclick="switchTab('words')">
          <span class="nav-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M21 5c-1.11-.35-2.33-.5-3.5-.5-1.95 0-4.05.4-5.5 1.5-1.45-1.1-3.55-1.5-5.5-1.5S2.45 4.9 1 6v14.65c0 .25.25.5.5.5.1 0 .15-.05.25-.05C3.1 20.45 5.05 20 6.5 20c1.95 0 4.05.4 5.5 1.5 1.35-.85 3.8-1.5 5.5-1.5 1.65 0 3.35.3 4.75 1.05.1.05.15.05.25.05.25 0 .5-.25.5-.5V6c-.6-.45-1.25-.75-2-1zm0 13.5c-1.1-.35-2.3-.5-3.5-.5-1.7 0-4.15.65-5.5 1.5V8c1.35-.85 3.8-1.5 5.5-1.5 1.2 0 2.4.15 3.5.5v11.5z"/></svg>
          </span>単語帳
        </div>
        <div class="nav-item" data-tab="practice" onclick="switchTab('practice')">
          <span class="nav-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/></svg>
          </span>練習
        </div>
        <div class="nav-item" data-tab="writing" onclick="switchTab('writing')">
          <span class="nav-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
          </span>作文
        </div>
        <div class="nav-item" data-tab="stats" onclick="switchTab('stats')">
          <span class="nav-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>
          </span>統計
        </div>
      </nav>
    </div>`;
  render();
}

function render(){
  const sc=document.getElementById('screen');if(!sc)return;
  if(S.tab==='words'){
    if(S.view==='list')sc.innerHTML=wordsListH();
    else if(S.view==='detail')sc.innerHTML=detailH();
    else if(S.view==='add')sc.innerHTML=addH();
  }else if(S.tab==='practice')sc.innerHTML=practiceH();
  else if(S.tab==='writing')sc.innerHTML=writingH();
  else sc.innerHTML=statsH();
}

function setView(v){
  S.view=v;
  if(v==='add'){S.addInput='';S.addResult=null;S.addErr='';S.addMemo='';S.addAiLoading=false;S.addMode='dict';S.addManual={word:'',reading:'',meaning:'',example:''};}  
  if(v==='list')S.sel=null;
  render();
}
function selWord(id){S.sel=S.words.find(w=>w.id===id);S.tense='present';S.view='detail';render();}
function goPractice(){S.tab='practice';S.pMode='flash';resetP();render();document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.tab==='practice'));}

loadAuth();
</script>
</body>
</html>
